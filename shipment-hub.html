    * { font-family: 'Inter', system-ui, sans-serif; }

    /* ── AlignUI Switch ── */
    .toggle-track { width: 36px; height: 20px; border-radius: 10px; transition: background 0.2s; position: relative; cursor: pointer; flex-shrink: 0; }
    .toggle-track.on  { background: #335cff; }
    .toggle-track.off { background: #cacfd8; }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 2px 4px 0 #0e121b14; }
    .toggle-track.on .toggle-thumb { transform: translateX(16px); }

    /* ── AlignUI Step Circles ── */
    .step-circle { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; transition: all 0.2s; }
    .step-circle.done    { background: #335cff; color: white; }
    .step-circle.active  { background: #335cff; color: white; box-shadow: 0 0 0 4px #476cff1a; }
    .step-circle.pending { background: #f2f5f8; color: #99a0ae; border: 1.5px solid #eaecf0; }

    /* ── AlignUI Checkbox (native, used in node modal) ── */
    input[type="checkbox"] { accent-color: #335cff; width: 15px; height: 15px; cursor: pointer; }

    /* ── AlignUI Badge ── */
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; }
    .badge-active  { background: #e3f7ec; color: #178c4e; }
    .badge-passive { background: #f5f7fa; color: #717784; }
    .badge-info    { background: #ebf1ff; color: #2547d0; }
    .badge-warning { background: #fff3eb; color: #c2570e; }
    .badge-danger  { background: #ffebec; color: #ad1f2b; }

    /* ── Toast animations ── */
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeUp  { to { opacity: 0; transform: translateY(-8px); } }
    .toast     { animation: slideIn 0.3s ease; }
    .toast.exit{ animation: fadeUp  0.3s ease forwards; }

    .cred-card { border: 1.5px solid #eaecf0; border-radius: 12px; overflow: hidden; transition: box-shadow 0.15s; }

    ::-webkit-scrollbar-thumb { background: #cacfd8; border-radius: 3px; }

    .action-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid; }

    .btn-toggle  { background: #e3f7ec; color: #178c4e; border-color: #84ebb4; }

    .btn-delete  { background: #ffebec; color: #ad1f2b; border-color: #ffc0c5; }

    .form-error { font-size: 12px; color: #fb3748; margin-top: 3px; }

    .primary-btn:hover:not(:disabled) { background: #2547d0; }

function packageItemFor(shipmentId) {
  return PRODUCT_POOL[shipmentId % PRODUCT_POOL.length];
}

function packageItemsFor(shipmentId) {
  const primary = { ...PRODUCT_POOL[shipmentId % PRODUCT_POOL.length], qty: 1 + (shipmentId % 2) };
  const items = [primary];
  if (shipmentId % 3 === 0) {
    items.push({ ...PRODUCT_POOL[(shipmentId + 2) % PRODUCT_POOL.length], qty: 1 });
  }
  return items;
}

function desiKgFor(shipmentId) {
  const desi = 3 + (shipmentId * 7) % 25;
  const weight = (1.5 + (shipmentId % 9) * 0.8).toFixed(1);
  return { desi, weight };
}

function plannedDeliveryDate(s) {
  const days = s.cargoType === 'return' ? 4 : 2;
  const d = new Date(s.shipTime);
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

function actualDeliveryDate(s) {
  if (s.status !== 'delivered' && s.status !== 'returned') return null;
  const days = s.cargoType === 'return' ? 5 : (1 + (s.id % 3));
  const d = new Date(s.shipTime);
  d.setDate(d.getDate() + days);
  return d.toISOString();
}

function isDamagedFor(shipmentId) { return shipmentId % 11 === 0; }
function pickupTimeHoursFor(shipmentId) { return 1 + (shipmentId % 6); }

function emailFor(name) {
  const ascii = name.toLowerCase()
    .replace(/ı/g, 'i').replace(/i̇/g, 'i').replace(/ş/g, 's').replace(/ğ/g, 'g')
    .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ç/g, 'c');
  return ascii.trim().split(/\s+/).join('.') + '@example.com';
}

function phoneFor(shipmentId) {
  return `+90 5${String(30000000 + shipmentId * 777).padStart(8, '0')}`;
}

function relativeTimeTr(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'az önce';
  if (mins < 60) return `${mins} dakika önce`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} saat önce`;
  const days = Math.floor(hours / 24);
  return `${days} gün önce`;
}

function copyToClipboard(text) {
  const finish = () => toast(t('toast.copied'), 'success');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(String(text)).then(finish).catch(() => fallbackCopy(text, finish));
  } else {
    fallbackCopy(text, finish);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = String(text);
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  cb();
}

function copyBtn(value) {
  const safe = String(value).replace(/'/g, "\\'");
  return `<button class="text-neutral-300 hover:text-primary transition-colors flex-shrink-0" onclick="event.stopPropagation(); copyToClipboard('${safe}')" title="Kopyala">
    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="1.5"/><path stroke-linecap="round" d="M5 15V5a2 2 0 012-2h10"/></svg>
  </button>`;
}

let barcodeTemplates = [
  { id: 1, name: 'Standart Kargo Etiketi', companyId: 1, format: 'pdf', requiredFields: ['trackingNo', 'companyName', 'address'], active: true },
  { id: 2, name: 'Termal Yazıcı Etiketi (ZPL)', companyId: 2, format: 'zpl', requiredFields: ['trackingNo', 'to', 'address'], active: true },
  { id: 3, name: 'İade Etiketi', companyId: null, format: 'pdf', requiredFields: ['trackingNo', 'docNo'], active: false },
];

function newBarcodeTemplateId() { return Math.max(0, ...barcodeTemplates.map(t => t.id)) + 1; }

function emptyBarcodeTemplateForm() {
  return { name: '', companyId: '', format: 'pdf', requiredFields: [], active: true };
}

function openBarcodeTemplateModal(id) {
  if (id === null) {
    S.barcodeTemplates.editModal = { show: true, id: null, form: emptyBarcodeTemplateForm() };
  } else {
    const tpl = barcodeTemplates.find(t => t.id === id);
    if (!tpl) return;
    S.barcodeTemplates.editModal = {
      show: true,
      id,
      form: { name: tpl.name, companyId: tpl.companyId || '', format: tpl.format, requiredFields: [...tpl.requiredFields], active: tpl.active },
    };
  }
  render();
}
function closeBarcodeTemplateModal() { S.barcodeTemplates.editModal.show = false; render(); }
function setBarcodeTemplateField(field, val) { S.barcodeTemplates.editModal.form[field] = val; render(); }
function toggleBarcodeTemplateRequiredField(field) {
  const arr = S.barcodeTemplates.editModal.form.requiredFields;
  const idx = arr.indexOf(field);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(field);
  render();
}

function saveBarcodeTemplate() {
  const m = S.barcodeTemplates.editModal;
  const f = m.form;
  if (!f.name.trim() || f.requiredFields.length === 0) return;
  const payload = {
    name: f.name.trim(),
    companyId: f.companyId ? +f.companyId : null,
    format: f.format,
    requiredFields: [...f.requiredFields],
    active: f.active,
  };
  if (m.id) {
    const idx = barcodeTemplates.findIndex(t => t.id === m.id);
    if (idx >= 0) barcodeTemplates[idx] = { ...barcodeTemplates[idx], ...payload };
    toast(`"${payload.name}" şablonu güncellendi.`, 'success');
  } else {
    barcodeTemplates.push({ id: newBarcodeTemplateId(), ...payload });
    toast(`"${payload.name}" şablonu oluşturuldu.`, 'success');
  }
  S.barcodeTemplates.editModal.show = false;
  render();
}

function deleteBarcodeTemplate(id) {
  const tpl = barcodeTemplates.find(t => t.id === id);
  if (!tpl) return;
  if (!confirm(`"${tpl.name}" şablonunu silmek istediğinizden emin misiniz?`)) return;
  barcodeTemplates = barcodeTemplates.filter(t => t.id !== id);
  toast(`"${tpl.name}" şablonu silindi.`, 'info');
  render();
}

function toggleBarcodeTemplateActive(id) {
  const tpl = barcodeTemplates.find(t => t.id === id);
  if (tpl) tpl.active = !tpl.active;
  render();
}

function t(key, vars) {
  const dict = I18N[S.lang] || I18N.tr;
  let str = dict[key] !== undefined ? dict[key] : (I18N.tr[key] !== undefined ? I18N.tr[key] : key);
  if (vars) {
    Object.keys(vars).forEach(k => { str = str.split('{' + k + '}').join(vars[k]); });
  }
  return str;
}

function newCredId()     { return ++S._credSeq; }
function newNodeId()     { return ++S._nodeSeq; }
function newContractId() { return Math.max(0, ...contracts.map(c => c.id)) + 1; }

function getCompany(id)  { return COMPANIES.find(c => c.id === +id); }
function getProvince(id) { return PROVINCES.find(p => p.id === +id); }
function fmtDate(d)      { return d ? new Date(d).toLocaleDateString('tr-TR') : '-'; }
function fmtDateTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return { time: `${pad(d.getHours())}:${pad(d.getMinutes())}`, date: `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()}` };
}
function fmtDateTimeStr(iso) {
  const { time, date } = fmtDateTime(iso);
  return `${time} · ${date}`;
}

// Returns every (kargo firması, credential, sözleşme) combination a node is attached to.
function getNodeUsage(nodeId) {
  const usage = [];
  contracts.forEach(c => {
    const co = getCompany(c.companyId);
    c.credentials.forEach(cred => {
      if (cred.nodes.some(n => n.id === nodeId)) {
        usage.push({
          companyId: c.companyId,
          companyName: co ? co.name : t('common.unknown'),
          credentialName: cred.name,
          contractId: c.id,
          contractName: c.name,
          contractStatus: c.status,
        });
      }
    });
  });
  return usage;
}

function getHeaderInfo() {
  switch (S.page) {
    case 'dashboard': return { title: 'Gösterge Paneli', desc: 'Genel operasyon durumu ve öne çıkan metrikler' };
    case 'shipments':
      if (S.shipments.view === 'detail') {
        const s = SHIPMENTS.find(x => x.id === S.shipments.detailId);
        return { title: s ? `Gönderi #${s.shipmentNo}` : 'Gönderi Detay', desc: '' };
      }
      return { title: 'Gönderiler', desc: 'Tüm gönderileri görüntüleyin ve yönetin' };
    case 'shipmentCreate': return { title: 'Yeni Gönderi Oluştur', desc: 'Sipariş bilgilerini girerek yeni bir gönderi oluşturun' };
    case 'returns':
      if (S.returns.view === 'detail') {
        const x = returns.find(r => r.id === S.returns.detailId);
        return { title: x ? `İade #${x.returnNo}` : 'İade Detay', desc: '' };
      }
      return { title: 'İade Yönetimi', desc: 'Gönderi iade taleplerini yönetin' };
    case 'returnCreate': return { title: 'Yeni İade Gönderisi Oluştur', desc: 'Orijinal gönderiyi seçerek iade talebi oluşturun' };
    case 'contracts':
      if (S.view === 'wizard') return { title: S.editingId !== null ? 'Sözleşme Düzenle' : 'Yeni Sözleşme Tanımla', desc: '' };
      return { title: 'Kargo Firmaları', desc: 'Kargo firması sözleşmelerini yönetin' };
    case 'nodes': return { title: 'Stok Merkezleri', desc: 'Depo ve node ilişkilerini görüntüleyin' };
    case 'routing': return { title: 'Akıllı Yönlendirme', desc: 'Desi, bölge ve tutara göre otomatik taşıyıcı kuralları' };
    case 'monitoring': return { title: 'Entegrasyon & İzleme', desc: 'Kargo firması API sağlığı, hata yönetimi ve webhook kuyruğu' };
    case 'reports': return { title: 'Raporlama & Analitik', desc: 'Performans, teslimat ve maliyet analizleri' };
    case 'users': return { title: 'Kullanıcılar', desc: 'Rol bazlı kullanıcı ve yetki yönetimi' };
    case 'templates': return { title: 'Bildirim Şablonları', desc: 'SMS ve e-posta bildirim şablonlarını yönetin' };
    case 'barcodeTemplates': return { title: 'Barkod Şablonları', desc: 'Kargo firmasına göre barkod etiket şablonlarını yönetin' };
    case 'finance': return { title: 'Finans', desc: 'Fiyatlandırma, fatura işlemleri ve kota bilgileri' };
    case 'performance': return { title: 'Kargo Performansı', desc: 'Kargo firması bazlı teslimat ve maliyet performansı' };
    case 'statusMapping': return { title: 'Statü Mapleme', desc: 'Kargo firması statülerini standart statülere eşleyin' };
    case 'transfers':
      if (S.transfers.view === 'detail') {
        const x = transfers.find(tr => tr.id === S.transfers.detailId);
        return { title: x ? `Transfer #${x.transferNo}` : 'Transfer Detay', desc: '' };
      }
      return { title: 'Transfer', desc: 'Node/depo/mağaza arası transfer gönderilerini yönetin' };
    case 'transferCreate': return { title: 'Yeni Transfer Oluştur', desc: 'Kaynak ve hedef node bilgilerini girerek transfer gönderisi oluşturun' };
    default: return { title: '', desc: '' };
  }
}

function navigateTo(page) {

function buildNodesPage() {
  const search = (S.nodeListSearch || '').toLowerCase().trim();
  const filtered = NODES.filter(n =>
    !search || n.name.toLowerCase().includes(search) || n.code.toLowerCase().includes(search)
  );

  return `
    <div class="flex items-center justify-between mb-6">
      <p class="text-sm text-neutral-500">${t('nodes.count', { n: NODES.length })}</p>
      <button class="primary-btn" onclick="openNodeCreateModal()">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        Yeni Stok Merkezi
      </button>
    </div>

    <div class="relative mb-4">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" class="form-input pl-9" placeholder="${t('nodes.search_placeholder')}"
        value="${S.nodeListSearch || ''}" oninput="setNodeListSearch(this.value)" />
    </div>

    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden divide-y divide-neutral-100" style="box-shadow:0 1px 2px 0 #0a0d1408">
      ${filtered.length === 0 ? `
        <div class="py-16 text-center">
          <svg class="w-10 h-10 text-neutral-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <p class="text-neutral-400 text-sm">${t('nodes.not_found')}</p>
        </div>
      ` : filtered.map(buildNodeRow).join('')}
    </div>

    ${S.nodeCreateModal.show ? buildNodeCreateModal() : ''}
    ${S.nodeDeleteModal.show ? buildNodeDeleteModal() : ''}
  `;
}

function buildNodeCreateModal() {
  const m = S.nodeCreateModal;
  return `
    <div class="overlay" onclick="if(event.target===this)closeNodeCreateModal()">
      <div class="modal-box w-full max-w-md p-6">
        <h3 class="font-semibold text-neutral-950 mb-4">Yeni Stok Merkezi</h3>
        <div class="flex flex-col gap-4">
          <div>
            <label class="form-label">Ad <span class="text-[#fb3748]">*</span></label>
            <input type="text" class="form-input" value="${m.name}" placeholder="Örn. İzmit Depo" oninput="setNodeCreateField('name', this.value)" />
          </div>
          <div>
            <label class="form-label">Kod <span class="text-[#fb3748]">*</span></label>
            <input type="text" class="form-input" value="${m.code}" placeholder="Örn. KOC002" oninput="setNodeCreateField('code', this.value)" />
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button class="secondary-btn" onclick="closeNodeCreateModal()">Vazgeç</button>
          <button class="primary-btn" onclick="saveNodeCreate()" ${!m.name.trim() || !m.code.trim() ? 'disabled' : ''}>
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            Oluştur
          </button>
        </div>
      </div>
    </div>
  `;
}

function buildNodeDeleteModal() {
  const node = NODES.find(n => n.id === S.nodeDeleteModal.id);
  return `
    <div class="overlay" onclick="if(event.target===this)closeNodeDeleteModal()">
      <div class="modal-box w-full max-w-md p-6">
        <div class="flex items-start gap-4">
          <div class="w-10 h-10 rounded-full bg-[#ffebec] flex items-center justify-center flex-shrink-0">
            <svg class="w-5 h-5 text-[#fb3748]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          </div>
          <div class="flex-1">
            <h3 class="font-semibold text-neutral-950 mb-1">Stok Merkezini Sil</h3>
            <p class="text-sm text-neutral-500"><strong class="text-neutral-700">${node ? node.name : ''}</strong> stok merkezini silmek istediğinizden emin misiniz?</p>
          </div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button class="secondary-btn" onclick="closeNodeDeleteModal()">Vazgeç</button>
          <button class="primary-btn" style="background:#fb3748" onclick="deleteNodeDefinition()">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            Evet, Sil
          </button>
        </div>
      </div>
    </div>
  `;
}

function openNodeCreateModal() { S.nodeCreateModal = { show: true, name: '', code: '' }; render(); }
function closeNodeCreateModal() { S.nodeCreateModal.show = false; render(); }
function setNodeCreateField(field, val) { S.nodeCreateModal[field] = val; render(); }
function saveNodeCreate() {
  const m = S.nodeCreateModal;
  if (!m.name.trim() || !m.code.trim()) return;
  const id = Math.max(0, ...NODES.map(n => n.id)) + 1;
  NODES.push({ id, name: m.name.trim(), code: m.code.trim().toUpperCase() });
  S.nodeCreateModal.show = false;
  toast(`"${m.name}" stok merkezi oluşturuldu.`, 'success');
  render();
}

function confirmDeleteNode(id) { S.nodeDeleteModal = { show: true, id }; render(); }
function closeNodeDeleteModal() { S.nodeDeleteModal.show = false; render(); }
function deleteNodeDefinition() {
  const id = S.nodeDeleteModal.id;
  const node = NODES.find(n => n.id === id);
  const idx = NODES.findIndex(n => n.id === id);
  if (idx >= 0) NODES.splice(idx, 1);
  S.nodeDeleteModal.show = false;
  toast(node ? `"${node.name}" stok merkezi silindi.` : 'Stok merkezi silindi.', 'info');
  render();
}

        </div>
      </div>
      ${expanded ? `
        <div class="px-5 pb-4 bg-neutral-50/50">

                    <th class="px-4 py-2.5 text-xs font-semibold text-neutral-400 uppercase tracking-wider">${t('nodes.col_status')}</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-neutral-100">
                  ${usage.map(u => `
                    <tr>
                      <td class="px-4 py-2.5 font-medium text-neutral-700">${u.companyName}</td>
                      <td class="px-4 py-2.5 text-neutral-500">${u.credentialName}</td>
                      <td class="px-4 py-2.5">

const SHIPMENT_SEARCH_FIELDS = [
  { key: 'shipmentNo' },
  { key: 'orderNo' },
  { key: 'trackingNo' },
  { key: 'referenceId' },
  { key: 'customerName' },
];

function getStatusTabs() {
  return [
    { key: 'all', label: t('common.all') },
    ...Object.keys(SHIPMENT_STATUS).map(key => ({ key, label: statusLabel(key) })),
  ];
}

function getFilteredShipments() {
  const sh = S.shipments;
  const q = sh.search.trim().toLowerCase();
  return SHIPMENTS.filter(s => {
    if (sh.filterStatus !== 'all' && s.status !== sh.filterStatus) return false;
    if (sh.filterSupplierId && s.companyId !== +sh.filterSupplierId) return false;
    if (sh.filterCargoType && s.cargoType !== sh.filterCargoType) return false;
    if (sh.dateFrom && s.shipTime.slice(0, 10) < sh.dateFrom) return false;
    if (sh.dateTo && s.shipTime.slice(0, 10) > sh.dateTo) return false;
    if (q && !String(s[sh.searchField] ?? '').toLowerCase().includes(q)) return false;
    return true;
  });
}

function cargoTypeChip(type) {
  if (type === 'order') {
    return `<span class="inline-flex items-center gap-1.5 text-xs font-medium text-primary whitespace-nowrap">
      <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
      ${cargoTypeLabel('order')}
    </span>`;
  }
  return `<span class="inline-flex items-center gap-1.5 text-xs font-medium whitespace-nowrap" style="color:#7d52f4">
    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>

}

  { key: 'shipmentNo' },

  { key: 'trackingNo' },

function renderShipmentCell(key, s) {
  const co = getCompany(s.companyId);
  const st = SHIPMENT_STATUS[s.status];
  const dt = fmtDateTime(s.shipTime);
  switch (key) {
    case 'shipmentNo':   return `<a class="text-primary hover:text-primary-darker font-semibold cursor-pointer" onclick="openShipmentDetail(${s.id})">${s.shipmentNo}</a>`;
    case 'orderNo':      return `<span class="text-neutral-600">${s.orderNo}</span>`;
    case 'companyId':    return `<span class="text-neutral-600">${co ? co.name : t('common.unknown')}</span>`;
    case 'trackingNo':   return `<span class="text-neutral-500 font-mono text-xs" title="${s.trackingNo}">${s.trackingNo}</span>`;
    case 'shipFrom':     return `<span class="text-neutral-600">${s.shipFrom}</span>`;
    case 'shipTo':       return `<span class="text-neutral-600">${s.shipTo.district} / ${s.shipTo.province}</span>`;
    case 'shipTime':     return `<div class="text-xs"><div class="font-medium text-neutral-700">${dt.time}</div><div class="text-neutral-400">${dt.date}</div></div>`;
    case 'status':       return `<span class="badge ${st.badge}">${statusLabel(s.status)}</span>`;
    case 'cargoType':    return cargoTypeChip(s.cargoType);
    case 'referenceId':  return `<span class="text-neutral-500 text-xs font-mono">${s.referenceId}</span>`;
    case 'packageNo':    return `<span class="text-neutral-500 text-xs font-mono">${s.packageNo}</span>`;

function buildPaginationNumbers(current, total) {
  const pages = [];
  if (total <= 7) {
    for (let p = 1; p <= total; p++) pages.push(p);
    return pages;
  }
  pages.push(1);
  if (current > 3) pages.push('...');
  for (let p = Math.max(2, current - 1); p <= Math.min(total - 1, current + 1); p++) pages.push(p);
  if (current < total - 2) pages.push('...');
  pages.push(total);
  return pages;
}

function buildShipmentDetail() {
  const s = SHIPMENTS.find(x => x.id === S.shipments.detailId);

  const co = getCompany(s.companyId);
  const st = SHIPMENT_STATUS[s.status];
  const item = packageItemFor(s.id);
  const contentItems = packageItemsFor(s.id);
  const totalQty = contentItems.reduce((sum, it) => sum + it.qty, 0);
  const dk = desiKgFor(s.id);
  const planned = plannedDeliveryDate(s);
  const actual = actualDeliveryDate(s);

  const packageExpanded = `

// ── actions ──
function setShipmentSearch(val)      { S.shipments.search = val; S.shipments.page = 1; render(); }
function setShipmentSearchField(val) { S.shipments.searchField = val; S.shipments.page = 1; render(); }
function setShipmentStatusFilter(status) { S.shipments.filterStatus = status; S.shipments.page = 1; render(); }
function toggleShipmentFilters()     { S.shipments.showFilters = !S.shipments.showFilters; render(); }
function setShipmentFilter(key, val) { S.shipments[key] = val; S.shipments.page = 1; render(); }

function setShipmentPage(p) {
  const sh = S.shipments;
  const totalPages = Math.max(1, Math.ceil(getFilteredShipments().length / sh.pageSize));
  sh.page = Math.min(Math.max(1, p), totalPages);
  render();
}

function toggleColumnPanel() { S.shipments.showColumnPanel = !S.shipments.showColumnPanel; render(); }
function closeColumnPanel()  { S.shipments.showColumnPanel = false; render(); }
function toggleShipmentColumn(key, checked) { S.shipments.visibleColumns[key] = checked; render(); }
function toggleAllShipmentColumns(checked) {
  SHIPMENT_COLUMNS.forEach(c => { S.shipments.visibleColumns[c.key] = checked; });
  render();
}

function resetShipmentFilters() {
  S.shipments.search = '';
  S.shipments.filterStatus = 'all';
  S.shipments.filterSupplierId = '';
  S.shipments.filterCargoType = '';
  S.shipments.dateFrom = '';
  S.shipments.dateTo = '';
  S.shipments.page = 1;
  render();
}

function toggleShipmentSelect(id, checked) {
  if (checked) {
    if (!S.shipments.selectedIds.includes(id)) S.shipments.selectedIds.push(id);
  } else {
    S.shipments.selectedIds = S.shipments.selectedIds.filter(x => x !== id);
  }
  render();
}

function toggleSelectAllShipments(checked) {
  const sh = S.shipments;
  const pageStart = (sh.page - 1) * sh.pageSize;
  const visibleIds = getFilteredShipments().slice(pageStart, pageStart + sh.pageSize).map(s => s.id);
  if (checked) {
    visibleIds.forEach(id => { if (!S.shipments.selectedIds.includes(id)) S.shipments.selectedIds.push(id); });
  } else {
    S.shipments.selectedIds = S.shipments.selectedIds.filter(id => !visibleIds.includes(id));
  }
  render();
}

function openShipmentDetail(id) {
  S.shipments.view = 'detail';
  S.shipments.detailId = id;
  S.shipments.detailExpanded = {};
  render();
}

function toggleDetailSection(key) {
  S.shipments.detailExpanded[key] = !S.shipments.detailExpanded[key];
  render();
}

function openStatusUpdateModal(id) {
  const s = SHIPMENTS.find(x => x.id === id);
  S.shipments.statusModal = { show: true, id, value: s ? s.status : null };
  render();
}

function closeStatusUpdateModal() {
  S.shipments.statusModal.show = false;
  render();
}

function setStatusModalValue(val) {
  S.shipments.statusModal.value = val;
  render();
}

function applyStatusUpdate() {
  const { id, value } = S.shipments.statusModal;
  const s = SHIPMENTS.find(x => x.id === id);
  if (s) s.status = value;
  S.shipments.statusModal.show = false;

function csvEscape(val) {
  const s = String(val ?? '');
  return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportShipmentsCsv() {
  const list = getFilteredShipments();
  if (list.length === 0) { toast(t('toast.csv_none'), 'warning'); return; }

  const headers = SHIPMENT_COLUMNS.map(c => t('column.' + c.key));
  const rows = list.map(s => [
    s.shipmentNo, s.orderNo, getCompany(s.companyId)?.name || '', s.trackingNo, s.shipFrom,
    `${s.shipTo.district} / ${s.shipTo.province}`, fmtDateTimeStr(s.shipTime), statusLabel(s.status),
    cargoTypeLabel(s.cargoType), s.referenceId, s.packageNo, s.customerName, s.channel,
  ]);
  const csv = [headers, ...rows].map(r => r.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${S.lang === 'tr' ? 'gonderiler' : 'shipments'}_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t('toast.csv_done', { n: list.length }), 'success');
}

function getOriginalShipment(id) { return SHIPMENTS.find(s => s.id === id); }

function getFilteredReturns() {
  const r = S.returns;
  const q = r.search.trim().toLowerCase();
  return returns.filter(x => {
    if (r.filterStatus !== 'all' && x.status !== r.filterStatus) return false;
    if (q) {
      const orig = getOriginalShipment(x.originalShipmentId);
      const hay = `${x.returnNo} ${orig ? orig.shipmentNo : ''} ${orig ? orig.orderNo : ''} ${orig ? orig.customerName : ''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function confirmBarcodeGeneration() {
  const m = S.barcodeModal;
  const format = m.format;
  const resolution = m.resolution || '203';
  S.barcodeModal.show = false;

  let items = [];
  if (m.kind === 'shipment') {
    const s = SHIPMENTS.find(x => x.id === m.id);
    if (s) items = [shipmentBarcodeData(s)];
  } else if (m.kind === 'shipmentBulk') {
    items = S.shipments.selectedIds
      .map(id => SHIPMENTS.find(s => s.id === id))
      .filter(Boolean)
      .map(shipmentBarcodeData);
  } else if (m.kind === 'return') {
    const x = returns.find(r => r.id === m.id);
    if (x) items = [returnBarcodeData(x)];
  }

  if (items.length === 0) { render(); return; }

  let html;
  if (format === 'pdf') html = buildBarcodeLabelHtml(items);
  else if (format === 'png') html = buildBarcodePngHtml(items, resolution);
  else html = buildBarcodeRawHtml(items, format);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');

  const resSuffix = format !== 'pdf' ? ` (${resolution} dpi)` : '';
  toast(`${items.length > 1 ? items.length + ' barkod' : 'Barkod'} yeni sekmede açıldı (${format.toUpperCase()}${resSuffix}).`, 'success');
  render();
}

// =========================================================
function ruleConditionsSummary(cond) {
  const parts = [];
  parts.push(`${cond.minDesi}–${cond.maxDesi} desi`);
  if (cond.provinceIds.length > 0) {
    const names = cond.provinceIds.map(id => getProvince(id)?.name).filter(Boolean);
    parts.push(names.length > 2 ? `${names.slice(0, 2).join(', ')} +${names.length - 2}` : names.join(', '));
  } else {
    parts.push('Tüm bölgeler');
  }
  if (cond.minAmount !== '' || cond.maxAmount !== '') {
    parts.push(`₺${cond.minAmount || 0}${cond.maxAmount ? '–₺' + cond.maxAmount : '+'}`);
  }
  return parts.join(' · ');
}

function matchRoutingRule(desi, provinceId, amount) {
  const sorted = [...routingRules].filter(r => r.active).sort((a, b) => a.priority - b.priority);
  for (const rule of sorted) {
    const c = rule.conditions;
    if (desi < c.minDesi || desi > c.maxDesi) continue;
    if (c.provinceIds.length > 0 && !c.provinceIds.includes(+provinceId)) continue;
    if (c.minAmount !== '' && amount < +c.minAmount) continue;
    if (c.maxAmount !== '' && amount > +c.maxAmount) continue;
    return rule;
  }
  return null;
}

function setRoutingWeight(field, val) { S.routing.weights[field] = +val; render(); }

function computeNormalizedCarrierScores(weights) {
  const total = weights.cost + weights.deliveryTime + weights.successRate || 1;
  const wCost = weights.cost / total, wDelivery = weights.deliveryTime / total, wSuccess = weights.successRate / total;

  const perf = computeCarrierPerformance();
  const perfMap = {};
  perf.forEach(p => { perfMap[p.companyId] = p; });

  const pricingByCompany = {};
  carrierPricing.forEach(p => {
    if (!pricingByCompany[p.companyId]) pricingByCompany[p.companyId] = [];
    pricingByCompany[p.companyId].push(p.price);
  });
  const avgPriceFor = (companyId) => {
    const prices = pricingByCompany[companyId];
    return prices && prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : null;
  };
  const allAvgPrices = COMPANIES.map(c => avgPriceFor(c.id)).filter(p => p !== null);
  const minPrice = allAvgPrices.length ? Math.min(...allAvgPrices) : 0;
  const maxPrice = allAvgPrices.length ? Math.max(...allAvgPrices) : 0;

  return COMPANIES.map(c => {
    const p = perfMap[c.id];
    const avgPrice = avgPriceFor(c.id);
    const costScore = avgPrice === null ? 0.5 : (maxPrice > minPrice ? 1 - ((avgPrice - minPrice) / (maxPrice - minPrice)) : 1);
    const deliveryScore = p ? p.otdRate : 0.5;
    const successScore = p ? p.successRate : 0.5;
    const combined = wCost * costScore + wDelivery * deliveryScore + wSuccess * successScore;
    return { companyId: c.id, companyName: c.name, costScore, deliveryScore, successScore, combined };
  }).sort((a, b) => b.combined - a.combined);
}

function buildRoutingScoringTab() {
  const scores = computeNormalizedCarrierScores(S.routing.weights);
  const maxScore = Math.max(0.01, ...scores.map(s => s.combined));
  return `
    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden" style="box-shadow:0 1px 2px 0 #0a0d1408">
      <div class="px-5 py-3.5 border-b border-neutral-100">

      </div>
      <div class="p-5 flex flex-col gap-3">
        ${scores.map((s, i) => `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-sm font-medium text-neutral-700 flex items-center gap-2">
                <span class="w-5 h-5 rounded-full ${i === 0 ? 'bg-[#fff3eb] text-[#c2570e]' : 'bg-neutral-100 text-neutral-500'} text-[11px] font-bold flex items-center justify-center flex-shrink-0">${i + 1}</span>
                ${s.companyName}
              </span>
              <span class="text-sm font-semibold text-neutral-800">${(s.combined * 100).toFixed(1)}</span>
            </div>
            <div class="w-full h-2 rounded-full bg-neutral-100 overflow-hidden">
              <div class="h-full rounded-full bg-primary" style="width:${(s.combined / maxScore * 100).toFixed(1)}%"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function openRoutingRuleModal(id) {
  if (id === null) {
    S.routing.editModal = { show: true, id: null, form: {
      name: '', minDesi: 0, maxDesi: 50, minAmount: '', maxAmount: '',
      provinceIds: [], primaryCompanyId: '', failoverCompanyId: '', active: true,
    }};
  } else {
    const rule = routingRules.find(r => r.id === id);
    S.routing.editModal = { show: true, id, form: {
      name: rule.name, minDesi: rule.conditions.minDesi, maxDesi: rule.conditions.maxDesi,
      minAmount: rule.conditions.minAmount, maxAmount: rule.conditions.maxAmount,
      provinceIds: [...rule.conditions.provinceIds],
      primaryCompanyId: rule.primaryCompanyId, failoverCompanyId: rule.failoverCompanyId,
      active: rule.active,
    }};
  }
  render();
}
function closeRoutingRuleModal() { S.routing.editModal.show = false; render(); }
function setRoutingRuleField(field, val) { S.routing.editModal.form[field] = val; }
function toggleRoutingRuleFormActive() { const f = S.routing.editModal.form; f.active = !f.active; render(); }
function toggleRoutingRuleProvince(id) {
  const f = S.routing.editModal.form;
  const idx = f.provinceIds.indexOf(id);
  if (idx >= 0) f.provinceIds.splice(idx, 1); else f.provinceIds.push(id);
  render();
}

function saveRoutingRule() {
  const m = S.routing.editModal;
  const f = m.form;
  if (!f.name || !f.primaryCompanyId) return;
  const conditions = {
    minDesi: +f.minDesi || 0, maxDesi: +f.maxDesi || 999,
    minAmount: f.minAmount === '' ? '' : +f.minAmount,
    maxAmount: f.maxAmount === '' ? '' : +f.maxAmount,
    provinceIds: f.provinceIds,
  };
  if (m.id === null) {
    routingRules.push({
      id: newRoutingRuleId(), name: f.name, priority: routingRules.length + 1, active: f.active,
      conditions, primaryCompanyId: +f.primaryCompanyId, failoverCompanyId: f.failoverCompanyId ? +f.failoverCompanyId : null,
    });
    logRuleHistory('created', f.name, 'Kural oluşturuldu.');
    toast(`"${f.name}" kuralı oluşturuldu.`, 'success');
  } else {
    const rule = routingRules.find(r => r.id === m.id);
    Object.assign(rule, {
      name: f.name, active: f.active, conditions,
      primaryCompanyId: +f.primaryCompanyId, failoverCompanyId: f.failoverCompanyId ? +f.failoverCompanyId : null,
    });
    logRuleHistory('updated', f.name, 'Kural güncellendi.');
    toast(`"${f.name}" kuralı güncellendi.`, 'success');
  }
  S.routing.editModal.show = false;
  render();
}

function confirmDeleteRoutingRule(id) { S.routing.deleteModal = { show: true, id }; render(); }
function closeRoutingDeleteModal() { S.routing.deleteModal.show = false; render(); }
function deleteRoutingRule() {
  const id = S.routing.deleteModal.id;
  const rule = routingRules.find(r => r.id === id);
  routingRules = routingRules.filter(r => r.id !== id);
  S.routing.deleteModal.show = false;
  if (rule) logRuleHistory('deleted', rule.name, 'Kural silindi.');
  toast(rule ? `"${rule.name}" kuralı silindi.` : 'Kural silindi.', 'info');
  render();
}

function toggleRoutingRuleActive(id) {
  const rule = routingRules.find(r => r.id === id);
  rule.active = !rule.active;
  logRuleHistory('toggled', rule.name, rule.active ? 'Kural aktif edildi.' : 'Kural pasife alındı.');
  toast(`"${rule.name}" ${rule.active ? 'aktif edildi' : 'pasife alındı'}.`, rule.active ? 'success' : 'info');
  render();
}

function moveRoutingRulePriority(id, direction) {
  const sorted = [...routingRules].sort((a, b) => a.priority - b.priority);
  const idx = sorted.findIndex(r => r.id === id);
  const swapIdx = idx + direction;
  if (swapIdx < 0 || swapIdx >= sorted.length) return;
  const a = sorted[idx], b = sorted[swapIdx];
  const tmp = a.priority; a.priority = b.priority; b.priority = tmp;
  logRuleHistory('reordered', a.name, `Öncelik sırası değiştirildi (${a.name} ↔ ${b.name}).`);
  render();
}

function setSimulatorField(field, val) { S.routing.simulator[field] = val; }
function runRoutingSimulation() {
  const sim = S.routing.simulator;
  if (sim.desi === '' || !sim.provinceId) {
    toast('Simülasyon için desi ve il bilgisi gereklidir.', 'warning');
    return;
  }
  sim.result = matchRoutingRule(+sim.desi, sim.provinceId, sim.amount === '' ? 0 : +sim.amount);
  render();
}

    if (s.search) {
      const q = s.search.toLowerCase();
      const from = getNode(x.fromNodeId);
      const to = getNode(x.toNodeId);
      const hay = `${x.transferNo} ${x.trackingNo} ${from ? from.name : ''} ${to ? to.name : ''}`.toLowerCase();

function confirmCancelTransfer(id) { S.transfers.cancelModal = { show: true, id }; render(); }
function closeCancelTransferModal() { S.transfers.cancelModal.show = false; render(); }
function cancelTransfer() {
  const id = S.transfers.cancelModal.id;
  const x = transfers.find(tr => tr.id === id);
  if (x) x.status = 'cancelled';
  S.transfers.cancelModal.show = false;
  toast(x ? `Transfer #${x.transferNo} iptal edildi.` : 'Transfer iptal edildi.', 'info');
  render();
}

function confirmRecallTransfer(id) { S.transfers.recallModal = { show: true, id }; render(); }
function closeRecallTransferModal() { S.transfers.recallModal.show = false; render(); }
function recallTransfer() {
  const id = S.transfers.recallModal.id;
  const x = transfers.find(tr => tr.id === id);
  if (x) x.status = 'recalled';
  S.transfers.recallModal.show = false;
  toast(x ? `Transfer #${x.transferNo} geri çağrıldı.` : 'Transfer geri çağrıldı.', 'warning');
  render();
}

function openTransferCarrierModal(id) {
  const x = transfers.find(tr => tr.id === id);
  S.transfers.carrierModal = { show: true, id, companyId: x ? x.companyId : '' };
  render();
}
function closeTransferCarrierModal() { S.transfers.carrierModal.show = false; render(); }
function setTransferCarrierValue(val) { S.transfers.carrierModal.companyId = val; render(); }
function applyTransferCarrierUpdate() {
  const { id, companyId } = S.transfers.carrierModal;
  const x = transfers.find(tr => tr.id === id);
  if (x) x.companyId = +companyId;
  S.transfers.carrierModal.show = false;
  const co = getCompany(+companyId);
  toast(x ? `Transfer #${x.transferNo} kargo firması "${co ? co.name : ''}" olarak güncellendi.` : 'Kargo firması güncellendi.', 'success');
  render();
}

function openTransferNodeModal(id) {
  const x = transfers.find(tr => tr.id === id);
  S.transfers.nodeModal = { show: true, id, fromNodeId: x ? x.fromNodeId : '', toNodeId: x ? x.toNodeId : '' };
  render();
}
function closeTransferNodeModal() { S.transfers.nodeModal.show = false; render(); }
function setTransferNodeField(field, val) { S.transfers.nodeModal[field] = val; render(); }
function applyTransferNodeUpdate() {
  const m = S.transfers.nodeModal;
  if (+m.fromNodeId === +m.toNodeId) return;
  const x = transfers.find(tr => tr.id === m.id);
  if (x) { x.fromNodeId = +m.fromNodeId; x.toNodeId = +m.toNodeId; }
  S.transfers.nodeModal.show = false;
  toast(x ? `Transfer #${x.transferNo} node bilgisi güncellendi.` : 'Node bilgisi güncellendi.', 'success');
  render();
}

function setTransferCreateField(field, val) { S.transferCreate[field] = val; S.transferCreate.errors[field] = ''; render(); }

function resetTransferCreateForm() {
  S.transferCreate = { fromNodeId: '', toNodeId: '', companyId: '', desi: '', note: '', errors: {} };
}

function submitTransferCreate() {
  const f = S.transferCreate;
  const errors = {};
  if (!f.fromNodeId) errors.fromNodeId = 'Kaynak node seçilmelidir.';
  if (!f.toNodeId) errors.toNodeId = 'Hedef node seçilmelidir.';
  if (f.fromNodeId && f.toNodeId && +f.fromNodeId === +f.toNodeId) errors.toNodeId = 'Hedef node, kaynak node ile aynı olamaz.';
  if (!f.companyId) errors.companyId = 'Kargo firması seçilmelidir.';
  if (!f.desi || +f.desi <= 0) errors.desi = 'Geçerli bir desi değeri girin.';
  if (Object.keys(errors).length > 0) {
    f.errors = errors;
    render();
    return;
  }
  const co = getCompany(+f.companyId);
  const prefix = co ? co.name.replace(/[^A-Za-z]/g, '').slice(0, 3).toUpperCase() : 'TRF';
  const newTransfer = {
    id: newTransferId(),
    transferNo: newTransferNo(),
    fromNodeId: +f.fromNodeId,
    toNodeId: +f.toNodeId,
    companyId: +f.companyId,
    trackingNo: `${prefix}-TR-${new Date().getFullYear()}-${Math.floor(Math.random() * 900000) + 100000}`,
    status: 'preparing',
    desi: +f.desi,
    note: f.note,
    createdAt: new Date().toISOString(),
  };
  transfers.unshift(newTransfer);
  toast(`Transfer #${newTransfer.transferNo} oluşturuldu.`, 'success');
  resetTransferCreateForm();
  S.page = 'transfers';
  openTransferDetail(newTransfer.id);
}

function openStatusMappingModal(id) {
  if (id === null) {
    S.statusMapping.editModal = { show: true, id: null, form: { companyId: COMPANIES[0].id, carrierStatus: '', standardStatus: 'preparing' } };
  } else {
    const m = statusMappings.find(x => x.id === id);
    if (!m) return;
    S.statusMapping.editModal = { show: true, id, form: { companyId: m.companyId, carrierStatus: m.carrierStatus, standardStatus: m.standardStatus } };
  }
  render();
}
function closeStatusMappingModal() { S.statusMapping.editModal.show = false; render(); }
function setStatusMappingField(field, val) { S.statusMapping.editModal.form[field] = val; render(); }
function saveStatusMapping() {
  const m = S.statusMapping.editModal;
  const f = m.form;
  if (!f.carrierStatus.trim()) return;
  const payload = { companyId: +f.companyId, carrierStatus: f.carrierStatus.trim(), standardStatus: f.standardStatus };
  if (m.id) {
    const idx = statusMappings.findIndex(x => x.id === m.id);
    if (idx >= 0) statusMappings[idx] = { ...statusMappings[idx], ...payload };
    toast('Eşleme güncellendi.', 'success');
  } else {
    statusMappings.push({ id: newStatusMappingId(), ...payload });
    toast('Yeni eşleme oluşturuldu.', 'success');
  }
  S.statusMapping.editModal.show = false;

// =========================================================
// KARGO PERFORMANSI — hasarlı/başarılı teslimat, OTD, pickup time, cost farkı
// =========================================================
function computeCarrierPerformance() {
  const byCompany = {};
  SHIPMENTS.forEach(s => {
    if (!byCompany[s.companyId]) byCompany[s.companyId] = { total: 0, delivered: 0, damaged: 0, onTime: 0, pickupSum: 0 };
    const b = byCompany[s.companyId];
    b.total++;
    b.pickupSum += pickupTimeHoursFor(s.id);
    if (s.status === 'delivered' || s.status === 'returned') {
      b.delivered++;
      if (isDamagedFor(s.id)) b.damaged++;
      const planned = plannedDeliveryDate(s);
      const actual = actualDeliveryDate(s);
      if (actual && new Date(actual) <= new Date(planned)) b.onTime++;
    }
  });
  return Object.keys(byCompany).map(cid => {
    const b = byCompany[cid];
    const co = getCompany(+cid);
    const invoices = carrierInvoices.filter(i => i.companyId === +cid);
    const costBalance = invoices.reduce((sum, i) => sum + (i.realCost - i.expectedCost), 0);
    const totalExpected = invoices.reduce((sum, i) => sum + i.expectedCost, 0);
    const costDiffPct = totalExpected ? (costBalance / totalExpected * 100) : 0;
    return {
      companyId: +cid,
      companyName: co ? co.name : t('common.unknown'),
      total: b.total,
      successRate: b.total ? b.delivered / b.total : 0,
      damagedRate: b.delivered ? b.damaged / b.delivered : 0,
      otdRate: b.delivered ? b.onTime / b.delivered : 0,
      avgPickupHours: b.total ? b.pickupSum / b.total : 0,
      costBalance,
      costDiffPct,
    };
  }).sort((a, b) => b.total - a.total);
}

function buildPerformancePage() {
  const rows = computeCarrierPerformance();
  const totalShipments = SHIPMENTS.length;
  const totalDelivered = SHIPMENTS.filter(s => s.status === 'delivered' || s.status === 'returned').length;
  const totalDamaged = SHIPMENTS.filter(s => isDamagedFor(s.id) && (s.status === 'delivered' || s.status === 'returned')).length;
  const totalOnTime = SHIPMENTS.filter(s => {
    if (s.status !== 'delivered' && s.status !== 'returned') return false;
    const actual = actualDeliveryDate(s);
    return actual && new Date(actual) <= new Date(plannedDeliveryDate(s));
  }).length;
  const overallSuccess = totalShipments ? (totalDelivered / totalShipments * 100) : 0;
  const overallDamaged = totalDelivered ? (totalDamaged / totalDelivered * 100) : 0;
  const overallOtd = totalDelivered ? (totalOnTime / totalDelivered * 100) : 0;
  const overallPickup = totalShipments ? (SHIPMENTS.reduce((sum, s) => sum + pickupTimeHoursFor(s.id), 0) / totalShipments) : 0;
  const overallCostBalance = carrierInvoices.reduce((sum, i) => sum + (i.realCost - i.expectedCost), 0);
  const overallExpected = carrierInvoices.reduce((sum, i) => sum + i.expectedCost, 0);

const STATUS_CHART_COLORS = {
  preparing:  '#fa7319',
  in_transit: '#335cff',
  delivered:  '#1fc16b',
  returned:   '#94a0b4',
  cancelled:  '#fb3748',
};

function shipmentCost(s) {
  return 35 + (s.id % 7) * 8 + (s.cargoType === 'return' ? 15 : 0);
}
function shipmentDeliveryDays(s) {
  return 1 + (s.id % 4) * 0.5;
}

function getFilteredReportReturns() {
  const r = S.reports;
  return returns.filter(x => {
    const day = x.requestDate.slice(0, 10);
    if (r.dateFrom && day < r.dateFrom) return false;
    if (r.dateTo && day > r.dateTo) return false;
    if (r.companyId) {
      const orig = getOriginalShipment(x.originalShipmentId);
      const cid = x.companyId || (orig ? orig.companyId : null);
      if (cid !== +r.companyId) return false;
    }
    return true;
  });
}

function getFilteredReportShipments() {
  const r = S.reports;
  return SHIPMENTS.filter(s => {
    const day = s.shipTime.slice(0, 10);
    if (r.dateFrom && day < r.dateFrom) return false;
    if (r.dateTo && day > r.dateTo) return false;
    if (r.companyId && s.companyId !== +r.companyId) return false;
    if (r.provinceId) {
      const prov = getProvince(+r.provinceId);
      if (!prov || s.shipTo.province !== prov.name) return false;
    }
    return true;
  });
}

function buildReportsPage() {
  const r = S.reports;
  const list = getFilteredReportShipments();
  const total = list.length;
  const delivered = list.filter(s => s.status === 'delivered').length;
  const returned = list.filter(s => s.status === 'returned').length;
  const successRate = total ? (delivered / total * 100) : 0;
  const returnRate = total ? (returned / total * 100) : 0;
  const avgDays = total ? (list.reduce((sum, s) => sum + shipmentDeliveryDays(s), 0) / total) : 0;
  const totalCost = list.reduce((sum, s) => sum + shipmentCost(s), 0);
  const returnCount = getFilteredReportReturns().length;
  const deliveredList = list.filter(s => s.status === 'delivered' || s.status === 'returned');
  const damagedCount = deliveredList.filter(s => isDamagedFor(s.id)).length;
  const damagedRate = deliveredList.length ? (damagedCount / deliveredList.length * 100) : 0;

  const byCompany = {};
  list.forEach(s => { byCompany[s.companyId] = (byCompany[s.companyId] || 0) + 1; });
  const companyRows = Object.keys(byCompany)
    .map(id => ({ company: getCompany(+id), count: byCompany[id] }))
    .sort((a, b) => b.count - a.count);
  const maxCompanyCount = Math.max(1, ...companyRows.map(c => c.count));

  const byStatus = {};
  list.forEach(s => { byStatus[s.status] = (byStatus[s.status] || 0) + 1; });
  const maxStatusCount = Math.max(1, ...Object.values(byStatus));

  const companyTable = Object.keys(byCompany).map(id => {
    const rows = list.filter(s => s.companyId === +id);
    const co = getCompany(+id);
    const del = rows.filter(s => s.status === 'delivered').length;
    const ret = rows.filter(s => s.status === 'returned').length;
    const avgCost = rows.reduce((sum, s) => sum + shipmentCost(s), 0) / rows.length;
    return { co, count: rows.length, successPct: (del / rows.length * 100), returnPct: (ret / rows.length * 100), avgCost };
  }).sort((a, b) => b.count - a.count);

  return `
    <div class="bg-white rounded-xl border border-neutral-200 p-4 mb-6 flex items-end gap-3 flex-wrap" style="box-shadow:0 1px 2px 0 #0a0d1408">
      <div>
        <label class="form-label">Başlangıç</label>
        <input type="date" class="form-input" value="${r.dateFrom}" onchange="setReportFilter('dateFrom', this.value)" />
      </div>
      <div>
        <label class="form-label">Bitiş</label>
        <input type="date" class="form-input" value="${r.dateTo}" onchange="setReportFilter('dateTo', this.value)" />
      </div>
      <div style="min-width:180px">
        <label class="form-label">Kargo Firması</label>
        <select class="form-input" onchange="setReportFilter('companyId', this.value)">
          <option value="">Tümü</option>
          ${COMPANIES.map(c => `<option value="${c.id}" ${r.companyId == c.id ? 'selected' : ''}>${c.name}</option>`).join('')}
        </select>
      </div>
      <div style="min-width:160px">
        <label class="form-label">Bölge</label>
        <select class="form-input" onchange="setReportFilter('provinceId', this.value)">
          <option value="">Tümü</option>
          ${PROVINCES.map(p => `<option value="${p.id}" ${r.provinceId == p.id ? 'selected' : ''}>${p.name}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="grid grid-cols-4 gap-3 mb-6">
      ${reportStatTile('Toplam Gönderi', total, '')}
      ${reportStatTile('Ort. Teslimat Süresi', avgDays.toFixed(1), ' gün')}
      ${reportStatTile('Teslimat Başarı Oranı', successRate.toFixed(1), '%')}
      ${reportStatTile('İade Oranı', returnRate.toFixed(1), '%')}
      ${reportStatTile('İade Sayısı', returnCount, '')}
      ${reportStatTile('Hasarlı Gönderi Oranı', damagedRate.toFixed(1), '%')}
      ${reportStatTile('Toplam Maliyet', '₺' + totalCost.toLocaleString('tr-TR'), '')}
    </div>

    <div class="grid grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-xl border border-neutral-200 p-5" style="box-shadow:0 1px 2px 0 #0a0d1408">
        <p class="text-sm font-semibold text-neutral-950 mb-4">Kargo Firması Bazlı Gönderi Hacmi</p>
        ${companyRows.length === 0 ? `<p class="text-sm text-neutral-400 py-6 text-center">Bu filtrede veri yok.</p>` : `
          <div class="flex flex-col gap-3">
            ${companyRows.map(row => `
              <div>
                <div class="flex items-center justify-between mb-1">
                  <span class="text-xs font-medium text-neutral-600">${row.company ? row.company.name : t('common.unknown')}</span>
                  <span class="text-xs font-semibold text-neutral-700">${row.count}</span>
                </div>
                <div class="w-full h-2 rounded-full bg-neutral-100 overflow-hidden">
                  <div class="h-full rounded-full bg-primary" style="width:${(row.count / maxCompanyCount * 100).toFixed(1)}%"></div>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>

      <div class="bg-white rounded-xl border border-neutral-200 p-5" style="box-shadow:0 1px 2px 0 #0a0d1408">
        <p class="text-sm font-semibold text-neutral-950 mb-4">Gönderi Durum Dağılımı</p>
        ${Object.keys(byStatus).length === 0 ? `<p class="text-sm text-neutral-400 py-6 text-center">Bu filtrede veri yok.</p>` : `
          <div class="flex flex-col gap-3">
            ${Object.keys(byStatus).map(key => `
              <div>
                <div class="flex items-center justify-between mb-1">
                  <span class="text-xs font-medium text-neutral-600 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full flex-shrink-0" style="background:${STATUS_CHART_COLORS[key]}"></span>
                    ${statusLabel(key)}
                  </span>
                  <span class="text-xs font-semibold text-neutral-700">${byStatus[key]}</span>
                </div>
                <div class="w-full h-2 rounded-full bg-neutral-100 overflow-hidden">
                  <div class="h-full rounded-full" style="width:${(byStatus[key] / maxStatusCount * 100).toFixed(1)}%;background:${STATUS_CHART_COLORS[key]}"></div>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>

    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden" style="box-shadow:0 1px 2px 0 #0a0d1408">
      <div class="px-5 py-3.5 border-b border-neutral-100">
        <p class="text-sm font-semibold text-neutral-950">Kargo Firması Bazlı Maliyet Analizi</p>
      </div>
      ${companyTable.length === 0 ? `<div class="py-10 text-center text-neutral-400 text-sm">Bu filtrede veri yok.</div>` : `
        <table class="w-full text-sm">
          <thead>
            <tr class="text-left border-b border-neutral-100">
              <th class="px-5 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider">Kargo Firması</th>
              <th class="px-5 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider">Gönderi Hacmi</th>
              <th class="px-5 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider">Başarı Oranı</th>
              <th class="px-5 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider">İade Oranı</th>
              <th class="px-5 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider">Ort. Maliyet</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-neutral-100">
            ${companyTable.map(row => `
              <tr class="hover:bg-neutral-50/80">
                <td class="px-5 py-3 font-medium text-neutral-700">${row.co ? row.co.name : t('common.unknown')}</td>
                <td class="px-5 py-3 text-neutral-600">${row.count}</td>
                <td class="px-5 py-3 text-[#178c4e] font-medium">%${row.successPct.toFixed(1)}</td>
                <td class="px-5 py-3 text-[#c2570e] font-medium">%${row.returnPct.toFixed(1)}</td>
                <td class="px-5 py-3 text-neutral-600">₺${row.avgCost.toFixed(0)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
}

function openUserModal(id) {
  if (id === null) {
    S.users.newModal = { show: true, id: null, name: '', email: '', role: 'operation', status: 'active' };
  } else {
    const u = users.find(x => x.id === id);
    S.users.newModal = { show: true, id, name: u.name, email: u.email, role: u.role, status: u.status };
  }
  render();
}
function closeUserModal() { S.users.newModal.show = false; render(); }
function setUserModalField(field, val) { S.users.newModal[field] = val; }
function toggleUserModalStatus() {
  const m = S.users.newModal;
  m.status = m.status === 'active' ? 'passive' : 'active';
  render();
}

function saveUser() {
  const m = S.users.newModal;
  if (!m.name || !m.email) return;
  if (m.id === null) {
    users.push({ id: newUserId(), name: m.name, email: m.email, role: m.role, status: m.status, lastLogin: '-' });
    toast(`"${m.name}" kullanıcısı oluşturuldu.`, 'success');
  } else {
    const u = users.find(x => x.id === m.id);
    Object.assign(u, { name: m.name, email: m.email, role: m.role, status: m.status });
    toast(`"${m.name}" kullanıcısı güncellendi.`, 'success');
  }
  S.users.newModal.show = false;
  render();
}

function toggleUserStatus(id) {
  const u = users.find(x => x.id === id);
  u.status = u.status === 'active' ? 'passive' : 'active';
  toast(`"${u.name}" ${u.status === 'active' ? 'aktif edildi' : 'pasife alındı'}.`, u.status === 'active' ? 'success' : 'info');
  render();
}

function confirmDeleteUser(id) { S.users.deleteModal = { show: true, id }; render(); }
function closeUserDeleteModal() { S.users.deleteModal.show = false; render(); }
function deleteUser() {
  const id = S.users.deleteModal.id;
  const u = users.find(x => x.id === id);
  users = users.filter(x => x.id !== id);
  S.users.deleteModal.show = false;
  toast(u ? `"${u.name}" kullanıcısı silindi.` : 'Kullanıcı silindi.', 'info');
  render();
}

function togglePermission(role, moduleIndex) {
  permissionMatrix[role][moduleIndex] = !permissionMatrix[role][moduleIndex];
  render();
}

function openTemplateModal(id) {
  if (id === null) {
    S.templates.editModal = { show: true, id: null, form: { name: '', type: 'sms', trigger: 'created', subject: '', body: '', active: true } };
  } else {
    const tpl = templates.find(x => x.id === id);
    S.templates.editModal = { show: true, id, form: { ...tpl } };
  }
  render();
}
function closeTemplateModal() { S.templates.editModal.show = false; render(); }
function setTemplateField(field, val) { S.templates.editModal.form[field] = val; render(); }
function insertTemplateVar(varName) {
  S.templates.editModal.form.body += `{{${varName}}}`;
  render();
}

function saveTemplate() {
  const m = S.templates.editModal;
  const f = m.form;
  if (!f.name) return;
  if (m.id === null) {
    templates.push({ id: newTemplateId(), ...f });
    toast(`"${f.name}" şablonu oluşturuldu.`, 'success');
  } else {
    const tpl = templates.find(x => x.id === m.id);
    Object.assign(tpl, f);
    toast(`"${f.name}" şablonu güncellendi.`, 'success');
  }
  S.templates.editModal.show = false;
  render();
}

function toggleTemplateActive(id) {
  const tpl = templates.find(x => x.id === id);
  tpl.active = !tpl.active;
  toast(`"${tpl.name}" ${tpl.active ? 'aktif edildi' : 'pasife alındı'}.`, tpl.active ? 'success' : 'info');
  render();
}

function deleteTemplate(id) {
  const tpl = templates.find(x => x.id === id);
  if (!confirm(`"${tpl.name}" şablonunu silmek istediğinizden emin misiniz?`)) return;
  templates = templates.filter(x => x.id !== id);
  toast(`"${tpl.name}" şablonu silindi.`, 'info');
  render();
}

function buildDashboardPage() {
  const totalShipments = SHIPMENTS.length;
  const delivered = SHIPMENTS.filter(s => s.status === 'delivered').length;
  const successRate = (delivered / totalShipments * 100).toFixed(1);
  const avgDays = (SHIPMENTS.reduce((sum, s) => sum + shipmentDeliveryDays(s), 0) / totalShipments).toFixed(1);
  const activeReturns = returns.filter(r => r.status !== 'completed' && r.status !== 'cancelled').length;
  const healthUp = CARRIER_HEALTH.filter(h => h.status === 'up').length;

function setDashboardFilter(field, val) { S.dashboard[field] = val; render(); }

function getDashboardShipments() {
  const d = S.dashboard;
  return SHIPMENTS.filter(s => {
    const day = s.shipTime.slice(0, 10);
    if (d.dateFrom && day < d.dateFrom) return false;
    if (d.dateTo && day > d.dateTo) return false;
    return true;
  });
}

function getDashboardReturns() {
  const d = S.dashboard;
  return returns.filter(x => {
    const day = x.requestDate.slice(0, 10);
    if (d.dateFrom && day < d.dateFrom) return false;
    if (d.dateTo && day > d.dateTo) return false;
    return true;
  });
}

function dashboardBarPanel(title, rows) {
  if (rows.length === 0) {
    return `
      <div class="bg-white rounded-xl border border-neutral-200 p-5" style="box-shadow:0 1px 2px 0 #0a0d1408">
        <p class="text-sm font-semibold text-neutral-950 mb-4">${title}</p>
        <p class="text-xs text-neutral-400 text-center py-6">Bu aralıkta veri yok.</p>
      </div>
    `;
  }
  const max = Math.max(0.0001, ...rows.map(r => Math.abs(r.value)));
  return `
    <div class="bg-white rounded-xl border border-neutral-200 p-5" style="box-shadow:0 1px 2px 0 #0a0d1408">
      <p class="text-sm font-semibold text-neutral-950 mb-4">${title}</p>
      <div class="flex flex-col gap-3">
        ${rows.map(r => `
          <div>
            <div class="flex items-center justify-between mb-1">
              <span class="text-xs font-medium text-neutral-600">${r.label}</span>
              <span class="text-xs font-semibold ${r.colorClass || 'text-neutral-700'}">${r.display}</span>
            </div>
            <div class="w-full h-1.5 rounded-full bg-neutral-100 overflow-hidden">
              <div class="h-full rounded-full ${r.barClass || 'bg-primary'}" style="width:${(Math.abs(r.value) / max * 100).toFixed(1)}%"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function dashboardShipmentsByCarrierWidget() {
  const list = getDashboardShipments();
  const byCompany = {};
  list.forEach(s => { byCompany[s.companyId] = (byCompany[s.companyId] || 0) + 1; });
  const rows = Object.keys(byCompany)
    .map(id => ({ label: getCompany(+id) ? getCompany(+id).name : t('common.unknown'), value: byCompany[id], display: String(byCompany[id]) }))
    .sort((a, b) => b.value - a.value);
  return dashboardBarPanel(`Gönderi Hacmi — Kargo Firması (${list.length})`, rows);
}

function dashboardReturnsByCarrierWidget() {
  const list = getDashboardReturns();
  const byCompany = {};
  list.forEach(x => {
    const orig = getOriginalShipment(x.originalShipmentId);
    const cid = x.companyId || (orig ? orig.companyId : null);
    if (cid) byCompany[cid] = (byCompany[cid] || 0) + 1;
  });
  const rows = Object.keys(byCompany)
    .map(id => ({ label: getCompany(+id) ? getCompany(+id).name : t('common.unknown'), value: byCompany[id], display: String(byCompany[id]) }))
    .sort((a, b) => b.value - a.value);
  return dashboardBarPanel(`İade Hacmi — Kargo Firması (${list.length})`, rows);
}

function dashboardOtdWidget() {
  const list = getDashboardShipments().filter(s => s.status === 'delivered' || s.status === 'returned');
  const byCompany = {};
  list.forEach(s => {
    if (!byCompany[s.companyId]) byCompany[s.companyId] = { delivered: 0, onTime: 0 };
    byCompany[s.companyId].delivered++;
    const actual = actualDeliveryDate(s);
    if (actual && new Date(actual) <= new Date(plannedDeliveryDate(s))) byCompany[s.companyId].onTime++;
  });
  const rows = Object.keys(byCompany)
    .map(id => {
      const b = byCompany[id];
      const pct = b.delivered ? (b.onTime / b.delivered * 100) : 0;
      return { label: getCompany(+id) ? getCompany(+id).name : t('common.unknown'), value: pct, display: `%${pct.toFixed(1)}`, colorClass: pct < 80 ? 'text-[#c2570e]' : 'text-[#178c4e]', barClass: pct < 80 ? '' : 'bg-primary' };
    })
    .sort((a, b) => b.value - a.value);
  return dashboardBarPanel('Zamanında Teslimat Oranı (OTD)', rows);
}

function dashboardCostBalanceWidget() {
  const d = S.dashboard;
  const list = carrierInvoices.filter(i => {
    const day = i.invoiceDate.slice(0, 10);
    if (d.dateFrom && day < d.dateFrom) return false;
    if (d.dateTo && day > d.dateTo) return false;
    return true;
  });
  const byCompany = {};
  list.forEach(i => {
    if (!byCompany[i.companyId]) byCompany[i.companyId] = { diff: 0, expected: 0 };
    byCompany[i.companyId].diff += (i.realCost - i.expectedCost);
    byCompany[i.companyId].expected += i.expectedCost;
  });
  const rows = Object.keys(byCompany)
    .map(id => {
      const b = byCompany[id];
      const pct = b.expected ? (b.diff / b.expected * 100) : 0;
      return {
        label: getCompany(+id) ? getCompany(+id).name : t('common.unknown'),
        value: pct,
        display: `${pct >= 0 ? '+' : ''}%${pct.toFixed(1)}`,
        colorClass: pct > 0 ? 'text-[#ad1f2b]' : pct < 0 ? 'text-[#178c4e]' : 'text-neutral-700',
        barClass: pct > 0 ? '' : 'bg-primary',
      };
    })
    .sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
  return dashboardBarPanel('Beklenen-Gerçek Maliyet Farkı (Kargo Firması)', rows);
}

function dashboardQuotaWidget() {
  const rows = carrierQuotas.map(q => {
    const remaining = Math.max(0, q.monthlyLimit - q.usedThisMonth);
    const pct = q.monthlyLimit ? (q.usedThisMonth / q.monthlyLimit * 100) : 0;
    return {
      label: getCompany(q.companyId) ? getCompany(q.companyId).name : t('common.unknown'),
      value: pct,
      display: `${remaining.toLocaleString('tr-TR')} kalan`,
      colorClass: pct >= 90 ? 'text-[#ad1f2b]' : pct >= 70 ? 'text-[#c2570e]' : 'text-neutral-700',
      barClass: pct >= 90 ? '' : pct >= 70 ? '' : 'bg-primary',
    };
  }).sort((a, b) => b.value - a.value);
  return dashboardBarPanel('Kalan Kota — Kargo Firması', rows);
}

function setShipmentCreateField(field, val) {
  S.shipmentCreate[field] = val;
  if (S.shipmentCreate.errors[field]) delete S.shipmentCreate.errors[field];
  render();
}
function setShipmentCreateProvince(val) {
  S.shipmentCreate.provinceId = val;
  S.shipmentCreate.district = '';
  if (S.shipmentCreate.errors.provinceId) delete S.shipmentCreate.errors.provinceId;
  render();
}
function resetShipmentCreateForm() {
  S.shipmentCreate = {
    orderNo: '', companyId: '', cargoType: 'order', customerName: '',
    shipFrom: '', provinceId: '', district: '', referenceId: '', packageNo: '',
    channel: 'Kendi Web Sitesi', errors: {},
  };
  render();
}

function validateShipmentCreate() {
  const f = S.shipmentCreate;
  const errs = {};
  if (!f.orderNo.trim()) errs.orderNo = 'Sipariş numarası zorunludur.';
  if (!f.companyId) errs.companyId = 'Kargo firması seçilmelidir.';
  if (!f.customerName.trim()) errs.customerName = 'Müşteri adı zorunludur.';
  if (!f.shipFrom) errs.shipFrom = 'Sevk yeri seçilmelidir.';
  if (!f.provinceId) errs.provinceId = 'İl seçilmelidir.';
  if (!f.district) errs.district = 'İlçe seçilmelidir.';
  return errs;
}

function submitShipmentCreate() {
  const errs = validateShipmentCreate();
  if (Object.keys(errs).length) {
    S.shipmentCreate.errors = errs;
    render();
    return;
  }
  const f = S.shipmentCreate;
  const province = getProvince(f.provinceId);
  const id = Math.max(0, ...SHIPMENTS.map(s => s.id)) + 1;
  const shipmentNo = Math.max(...SHIPMENTS.map(s => s.shipmentNo)) + 1;
  const orderNoVal = isNaN(+f.orderNo) ? f.orderNo : +f.orderNo;

  const newShipment = {
    id, shipmentNo, orderNo: orderNoVal, companyId: +f.companyId,
    trackingNo: generateTrackingNo(+f.companyId),
    shipFrom: f.shipFrom,
    shipTo: { district: f.district, province: province.name },
    shipTime: new Date().toISOString(),
    status: 'preparing',
    cargoType: f.cargoType,
    referenceId: f.referenceId || `REF-${Math.floor(Math.random() * 90000) + 10000}`,
    packageNo: f.packageNo || `PKT-${String(id).padStart(6, '0')}`,
    customerName: f.customerName,
    channel: f.channel,
  };
  SHIPMENTS.push(newShipment);
  toast(`Gönderi #${newShipment.shipmentNo} oluşturuldu.`, 'success');
  resetShipmentCreateForm();
  S.page = 'shipments';
  openShipmentDetail(newShipment.id);
}

  S.returnCreate[field] = val;

  render();
}
function toggleReturnCreatePickup() { S.returnCreate.pickup = !S.returnCreate.pickup; render(); }
function resetReturnCreateForm() {
  S.returnCreate = { originalShipmentId: '', reason: 'begenmedim', pickup: true, note: '', errors: {} };

function submitReturnCreate() {
  const f = S.returnCreate;
  if (!f.originalShipmentId) {
    S.returnCreate.errors = { originalShipmentId: 'Orijinal gönderi seçilmelidir.' };
    render();
    return;
  }
  const newReturn = {
    id: newReturnId(),
    returnNo: 9300000 + Math.floor(Math.random() * 900) + 200,
    originalShipmentId: +f.originalShipmentId,
    reason: f.reason,
    status: 'requested',
    requestDate: new Date().toISOString(),
    pickup: f.pickup,
    note: f.note,
  };
  returns.unshift(newReturn);
  toast(`İade #${newReturn.returnNo} talebi oluşturuldu.`, 'success');
  resetReturnCreateForm();
  S.page = 'returns';
  openReturnDetail(newReturn.id);
}

            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
            ${t('contracts.row_edit')}
          </button>
          <button class="action-btn ${toggleClass}" onclick="toggleStatus(${c.id})">
            ${c.status === 'active'
              ? `<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>`
              : `<svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
            }
            ${toggleLabel}
          </button>
          <button class="action-btn btn-delete" onclick="confirmDelete(${c.id})">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>

          </button>
        </div>
      </td>
    </tr>
  `;
}

// =========================================================
// WIZARD
// =========================================================
function buildWizard() {
  const isEdit = S.editingId !== null;

  const STEPS = [
    { label: t('wizard.step1_label'), desc: t('wizard.step1_desc') },
    { label: t('wizard.step2_label'), desc: t('wizard.step2_desc') },
    { label: t('wizard.step3_label'), desc: t('wizard.step3_desc') },
  ];

  const sidebar = `
    <div class="w-60 flex-shrink-0 bg-neutral-50 border-r border-neutral-200 px-6 py-8 flex flex-col">
      <p class="text-[11px] font-semibold text-neutral-400 uppercase tracking-widest mb-6">
        ${isEdit ? t('wizard.edit_title') : t('wizard.new_title_short')}
      </p>
      <div class="flex flex-col">
        ${STEPS.map((s, i) => {
          const n = i + 1;
          const st = n < S.step ? 'done' : n === S.step ? 'active' : 'pending';
          const isLast = i === STEPS.length - 1;
          return `
            <div class="flex gap-3.5">
              <div class="flex flex-col items-center flex-shrink-0">
                <div class="step-circle ${st}">
                  ${st === 'done'
                    ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                    : n}
                </div>
                ${!isLast ? `<div class="w-px flex-1 my-2 ${st === 'done' ? 'bg-primary-light' : 'bg-neutral-200'}" style="min-height:36px"></div>` : ''}
              </div>
              <div class="${isLast ? 'pt-1' : 'pb-8 pt-1'}">
                <p class="text-sm font-semibold leading-snug ${st === 'pending' ? 'text-neutral-400' : st === 'active' ? 'text-primary-dark' : 'text-neutral-950'}">${s.label}</p>
                <p class="text-xs mt-0.5 leading-relaxed ${st === 'pending' ? 'text-neutral-300' : 'text-neutral-400'}">${s.desc}</p>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;

  let stepContent = '';
  if (S.step === 1) stepContent = buildStep1();
  if (S.step === 2) stepContent = buildStep2();
  if (S.step === 3) stepContent = buildStep3();

  return `
    <div class="mb-5 flex items-center gap-3">
      <button class="secondary-btn py-2 px-3" onclick="backToList()">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
        ${t('wizard.back_to_list')}
      </button>
    </div>

    <div class="bg-white rounded-xl border border-neutral-200 flex overflow-hidden" style="min-height:520px;box-shadow:0 1px 2px 0 #0a0d1408">
      ${sidebar}
      <div class="flex-1 flex flex-col min-w-0">
        <div class="flex-1 px-8 py-8 overflow-y-auto">
          ${stepContent}
        </div>
        <div class="flex items-center justify-between px-8 py-4 border-t border-neutral-100 bg-neutral-50/60">
          <div>
            ${S.step > 1
              ? `<button class="secondary-btn" onclick="prevStep()">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                  ${t('common.back')}
                 </button>`
              : ''}
          </div>
          <div class="flex items-center gap-3">
            <span class="text-sm text-neutral-400">${t('wizard.step_indicator', { n: S.step })}</span>
            ${S.step < 3
              ? `<button class="primary-btn" onclick="nextStep()">
                  ${t('wizard.next')}
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                 </button>`
              : `<button class="primary-btn" onclick="saveContract()" ${S.validating ? 'disabled' : ''}>
                  ${S.validating
                    ? `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> ${t('wizard.validating')}`
                    : `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg> ${t('common.save')}`
                  }
                 </button>`
            }
          </div>
        </div>
      </div>
    </div>
  `;
}

      <div class="col-span-2">
        <div class="h-px bg-neutral-100 my-1"></div>
        <p class="text-xs font-semibold text-neutral-400 uppercase tracking-wider mt-4 mb-4">${t('step1.desi_section')}</p>
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="form-label">${t('step1.min_desi')} <span class="text-[#fb3748]">*</span></label>
            <input type="number" class="form-input ${e.minDesi?'error':''}" value="${f.minDesi}" min="0" placeholder="0" oninput="setField('minDesi', this.value)" />

          </div>

            ${e.maxDesi ? `<p class="form-error">${e.maxDesi}</p>` : ''}
          </div>
        </div>
      </div>

      <div class="col-span-2">
        <div class="h-px bg-neutral-100 my-1"></div>
        <p class="text-xs font-semibold text-neutral-400 uppercase tracking-wider mt-4 mb-4">${t('step1.amount_section')} <span class="font-normal normal-case text-neutral-400">${t('step1.optional')}</span></p>
        <div class="grid grid-cols-2 gap-5">
          <div>
            <label class="form-label">${t('step1.min_amount')}</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-sm">₺</span>
              <input type="number" class="form-input pl-7 ${e.minOrderAmount?'error':''}" value="${f.minOrderAmount}" min="0" placeholder="${t('step1.no_limit')}" oninput="setField('minOrderAmount', this.value)" />
            </div>
            ${e.minOrderAmount ? `<p class="form-error">${e.minOrderAmount}</p>` : ''}
          </div>
          <div>
            <label class="form-label">${t('step1.max_amount')}</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-sm">₺</span>
              <input type="number" class="form-input pl-7 ${e.maxOrderAmount?'error':''}" value="${f.maxOrderAmount}" min="0" placeholder="${t('step1.no_limit')}" oninput="setField('maxOrderAmount', this.value)" />
            </div>
            ${e.maxOrderAmount ? `<p class="form-error">${e.maxOrderAmount}</p>` : ''}
          </div>
        </div>
      </div>

      <div class="col-span-2">
        <div class="h-px bg-neutral-100 my-1"></div>
        <p class="text-xs font-semibold text-neutral-400 uppercase tracking-wider mt-4 mb-4">${t('step1.shipping_type_section')}</p>
        ${e.shippingType ? `<p class="form-error mb-3">${e.shippingType}</p>` : ''}
        <div class="flex flex-col gap-3">
          ${buildToggle('orderShipping', f.orderShipping, t('step1.order_shipping_label'), t('step1.order_shipping_desc'))}
          ${buildToggle('returnShipping', f.returnShipping, t('step1.return_shipping_label'), t('step1.return_shipping_desc'))}
          ${buildToggle('transferShipping', f.transferShipping, 'Transfer Gönderisi', 'Bu sözleşme depolar/mağazalar arası transfer gönderimlerinde kullanılsın')}
        </div>
      </div>

      <div class="col-span-2">
        <div class="h-px bg-neutral-100 my-1"></div>
        <p class="text-xs font-semibold text-neutral-400 uppercase tracking-wider mt-4 mb-1">Ek Kurallar <span class="font-normal normal-case text-neutral-400">(isteğe bağlı — boş bırakılırsa kısıt uygulanmaz)</span></p>

        <p class="text-xs font-medium text-neutral-500 mt-4 mb-2">Ürün Tipi Kısıtı</p>

        <p class="text-xs font-medium text-neutral-500 mt-4 mb-2">Paket Tipi Kuralı</p>
        <div class="flex flex-wrap gap-1.5">${buildMultiChipMap('packageTypes', PACKAGE_TYPES, f.packageTypes)}</div>

        <p class="text-xs font-medium text-neutral-500 mt-4 mb-2">Sipariş Kanalı Kuralı</p>
        <div class="flex flex-wrap gap-1.5">${buildMultiChipList('channels', SHIPMENT_CHANNELS, f.channels)}</div>

        <p class="text-xs font-medium text-neutral-500 mt-4 mb-2">Ödeme Tipi Kuralı</p>
        <div class="flex flex-wrap gap-1.5">${buildMultiChipMap('paymentTypes', ORDER_PAYMENT_TYPES, f.paymentTypes)}</div>
      </div>

    </div>
