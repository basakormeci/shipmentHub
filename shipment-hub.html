function buildMultiChipMap(field, optionsMap, selected) {
  return Object.keys(optionsMap).map(key => {
    const active = selected.includes(key);
    return `<button type="button" class="filter-tab ${active ? 'active' : ''}" onclick="toggleMultiSelectField('${field}', '${key}')">${optionsMap[key]}</button>`;
  }).join('');
}

function buildMultiChipList(field, list, selected) {
  return list.map(val => {
    const active = selected.includes(val);
    return `<button type="button" class="filter-tab ${active ? 'active' : ''}" onclick="toggleMultiSelectField('${field}', '${val}')">${val}</button>`;
  }).join('');
}

function toggleMultiSelectField(field, key) {
  const arr = S.f[field];
  const idx = arr.indexOf(key);
  if (idx >= 0) arr.splice(idx, 1); else arr.push(key);
  render();
}

function buildToggle(field, val, label, desc) {
  return `
    <div class="flex items-center justify-between p-4 rounded-xl border border-neutral-100 bg-neutral-50/50">
      <div>
        <p class="text-sm font-medium text-neutral-950">${label}</p>
        <p class="text-xs text-neutral-400 mt-0.5">${desc}</p>
      </div>
      <div class="toggle-track ${val?'on':'off'}" onclick="toggleField('${field}')">
        <div class="toggle-thumb"></div>
      </div>
    </div>
  `;
}

// =========================================================
// STEP 2
// =========================================================
function buildStep2() {
  const f = S.f;
  const search = (f.search2 || '').toLowerCase().trim();
  const isSearching = search.length > 0;
  const activeProv = getProvince(f.activeProvinceId2);

  function coverage(provId) { return f.coveredRegions.find(r => r.provinceId === provId); }
  function isFull(c)    { return c && c.districts.length === 0; }
  function isPartial(c) { return c && c.districts.length > 0; }

  let totalProv = 0, totalDist = 0;
  f.coveredRegions.forEach(r => {
    totalProv++;
    const p = getProvince(r.provinceId);
    totalDist += r.districts.length === 0 ? (p ? p.districts.length : 0) : r.districts.length;
  });
  const hasSel = f.coveredRegions.length > 0;
  const allProvsSelected = f.coveredRegions.length === PROVINCES.length && f.coveredRegions.every(r => r.districts.length === 0);

  function chkBox(full, partial) {
    if (full)    return `<div style="width:16px;height:16px;border-radius:4px;background:#335cff;border:2px solid #335cff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    if (partial) return `<div style="width:16px;height:16px;border-radius:4px;background:#ebf1ff;border:2px solid #335cff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="width:8px;height:2px;background:#335cff;border-radius:1px"></div></div>`;
    return `<div style="width:16px;height:16px;border-radius:4px;background:white;border:1.5px solid #eaecf0;flex-shrink:0"></div>`;
  }

  let searchHTML = '';
  if (isSearching) {
    const hits = [];
    PROVINCES.forEach(p => {
      const c = coverage(p.id);
      if (p.name.toLowerCase().includes(search)) {
        hits.push({ type: 'province', prov: p, checked: !!c, full: isFull(c), partial: isPartial(c) });
      }
      p.districts.forEach(d => {
        if (d.toLowerCase().includes(search)) {
          const distChecked = isFull(c) || (c && c.districts.includes(d));
          hits.push({ type: 'district', prov: p, name: d, checked: distChecked });
        }
      });
    });

    if (!hits.length) {
      searchHTML = `<div style="padding:28px 16px;text-align:center;color:#99a0ae;font-size:13px">${t('step2.no_results')}</div>`;
    } else {
      searchHTML = hits.map(h => {
        if (h.type === 'province') {
          return `<div onclick="toggleProvinceInCoverage(${h.prov.id})" style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f2f5f8" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
            ${chkBox(h.full, h.partial)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:500;color:#0e121b">${h.prov.name}</div>
              <div style="font-size:11.5px;color:#99a0ae">${t('step2.district_count', { n: h.prov.districts.length })}</div>
            </div>
            <span style="font-size:11px;font-weight:500;color:#335cff;background:#ebf1ff;padding:2px 8px;border-radius:999px">${t('step2.province_badge')}</span>
          </div>`;
        } else {
          return `<div onclick="toggleDistrictInCoverage(${h.prov.id}, ${JSON.stringify(h.name).replace(/"/g, '&quot;')})" style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f2f5f8" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
            ${chkBox(h.checked, false)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:500;color:#0e121b">${h.name}</div>
              <div style="font-size:11.5px;color:#99a0ae">${h.prov.name}</div>
            </div>
          </div>`;
        }
      }).join('');
    }
  }

  const provListHTML = PROVINCES.map(p => {
    const c = coverage(p.id);
    const full = isFull(c), partial = isPartial(c);
    const isActive = f.activeProvinceId2 == p.id;
    const countText = full ? t('step2.district_count', { n: p.districts.length }) : partial ? `${c.districts.length}/${p.districts.length}` : '';
    return `<div onclick="activateProvince2(${p.id})" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;${isActive ? 'background:#ebf1ff' : ''}" onmouseover="if(!${isActive})this.style.background='#f5f7fa'" onmouseout="if(!${isActive})this.style.background=''">
      ${chkBox(full, partial)}
      <div style="font-size:13px;flex:1;color:${isActive ? '#1f3bad' : '#0e121b'};font-weight:${isActive ? '600' : '400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
      ${countText ? `<span style="font-size:11.5px;color:#525866;flex-shrink:0">${countText}</span>` : ''}
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:${isActive ? '#335cff' : '#cacfd8'};flex-shrink:0"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');

  let distListHTML = '';
  let activeAllLabel = t('step2.select_all');
  if (activeProv) {
    const c = coverage(activeProv.id);
    const full = isFull(c);
    const allSel = full || (c && c.districts.length === activeProv.districts.length);
    activeAllLabel = allSel ? t('step2.deselect_all') : t('step2.select_all');
    distListHTML = activeProv.districts.map(d => {
      const checked = full || (c && c.districts.includes(d));
      return `<div onclick="toggleDistrictInCoverage(${activeProv.id}, ${JSON.stringify(d).replace(/"/g, '&quot;')})" style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:8px" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
        ${chkBox(checked, false)}
        <span style="font-size:13px;color:#0e121b">${d}</span>
      </div>`;
    }).join('');
  }

  const chipsHTML = f.coveredRegions.map(r => {
    const label = r.districts.length === 0
      ? r.provinceName
      : r.districts.length === 1
        ? `${r.provinceName} · ${r.districts[0]}`
        : `${r.provinceName} · ${t('step2.district_count', { n: r.districts.length })}`;
    return `<div style="display:inline-flex;align-items:center;gap:6px;background:#f2f5f8;border:1px solid #eaecf0;border-radius:999px;padding:4px 6px 4px 11px">
      <span style="font-size:12px;font-weight:500;color:#0e121b;white-space:nowrap">${label}</span>
      <div onclick="removeCoveredRegion2(${r.provinceId})" style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#99a0ae" onmouseover="this.style.background='#ffebec';this.style.color='#fb3748'" onmouseout="this.style.background='';this.style.color='#99a0ae'">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;flex-direction:column;gap:14px">

      <div style="position:relative">
        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#99a0ae;pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" class="form-input" style="padding-left:38px" placeholder="${t('step2.search_placeholder')}"
          value="${f.search2 || ''}" oninput="setStep2Search(this.value)" />
      </div>

      ${isSearching ? `
        <div style="border:1px solid #eaecf0;border-radius:12px;max-height:300px;overflow-y:auto">
          ${searchHTML}
        </div>
      ` : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;height:296px">

          <div style="border:1px solid #eaecf0;border-radius:12px;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 12px;border-bottom:1px solid #f2f5f8;background:#f5f7fa;flex-shrink:0">
              <span style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#99a0ae">${t('step2.provinces_header')}</span>
              <button onclick="toggleAllProvinces2()" style="font-size:11.5px;font-weight:500;color:#335cff;background:transparent;border:none;cursor:pointer;padding:3px 6px;border-radius:6px;font-family:inherit">
                ${allProvsSelected ? t('step2.deselect_all') : t('step2.select_all')}
              </button>
            </div>

  const statusBadge = vr === 'ok'
    ? `<span class="badge" style="background:#e3f7ec;color:#178c4e">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>

    ? `<span class="badge" style="background:#ffebec;color:#681219">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>

              </button>
            </div>
          </div>
        ` : ''}
        ${fields.includes('customerId') ? `
          <div>
            <label class="form-label">${t('step3.customer_id_label')} <span class="text-[#fb3748]">*</span></label>
            <input type="text" class="form-input"
              value="${cred.customerId || ''}" placeholder="${t('step3.customer_id_label')}"
              oninput="updateCred(${cred.id}, 'customerId', this.value)" />

        ` : ''}
      </div>
      ${vr === 'error' ? `
        <div class="px-5 pb-4">
          <div class="flex items-center gap-2 bg-[#ffebec] border border-[#ffc0c5] text-[#681219] text-xs px-3 py-2 rounded-lg">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            ${t('step3.connection_error_msg')}

        </div>
      ` : ''}
      <div class="px-5 pb-4 border-t border-neutral-100 pt-3">
        <button class="w-full flex items-center justify-center gap-2 text-sm font-medium text-primary bg-primary-lighter hover:bg-primary-light border border-primary-light rounded-lg py-2.5 transition-colors" onclick="openNodeModal(${cred.id})">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
          ${t('step3.manage_nodes')}
          <span class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full leading-none">${cred.nodes.length}</span>

    </div>
  `;
}

// =========================================================
function buildNodeModal() {
  const m = S.nodeModal;
  const cred = S.f.credentials.find(c => c.id === m.credId);
  if (!cred) return '';

  const addedIds = new Set(cred.nodes.map(n => n.id));
  const search = m.search.toLowerCase();
  const filtered = NODES.filter(n =>
    !addedIds.has(n.id) &&
    (search === '' || n.name.toLowerCase().includes(search) || n.code.toLowerCase().includes(search))
  );
  const selCount = m.selectedNodeIds.length;

  return `
    <div class="overlay" onclick="if(event.target===this)closeNodeModal()">
      <div class="modal-box w-full max-w-xl flex flex-col" style="max-height:85vh">

        <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-100 flex-shrink-0">
          <div>
            <h3 class="font-semibold text-neutral-950">${t('nodeModal.title')}</h3>
            <p class="text-xs text-neutral-400 mt-0.5">${cred.name}</p>
          </div>
          <button class="text-neutral-400 hover:text-neutral-600 p-1 rounded-lg hover:bg-neutral-100 transition-colors" onclick="closeNodeModal()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="overflow-y-auto flex-1 px-6 py-5 flex flex-col gap-5">

          <div>
            <div class="flex items-center justify-between mb-2.5">
              <p class="text-xs font-semibold text-neutral-500 uppercase tracking-wider">${t('nodeModal.added_nodes')}</p>
              <span class="text-xs text-neutral-400">${t('nodeModal.node_count', { n: cred.nodes.length })}</span>
            </div>
            ${cred.nodes.length === 0 ? `
              <div class="text-center py-5 border border-dashed border-neutral-200 rounded-xl text-neutral-400 text-sm">
                ${t('nodeModal.no_nodes_added')}
              </div>
            ` : `
              <div class="border border-neutral-200 rounded-xl overflow-hidden divide-y divide-neutral-100">
                ${cred.nodes.map(node => `
                  <div class="flex items-center justify-between px-4 py-3 hover:bg-neutral-50/80 group">
                    <div class="flex items-center gap-3">
                      <div class="w-7 h-7 rounded-lg bg-[#e3f7ec] flex items-center justify-center flex-shrink-0">
                        <svg class="w-3.5 h-3.5 text-[#1fc16b]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-neutral-700">${node.name}</p>
                        <p class="text-xs text-neutral-400 font-mono">${node.code}</p>
                      </div>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-neutral-300 hover:text-[#fb3748] transition-all p-1 rounded" onclick="deleteNode(${cred.id}, ${node.id})">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                `).join('')}
              </div>
            `}
          </div>

          <div>
            <div class="flex items-center justify-between mb-2.5">
              <p class="text-xs font-semibold text-neutral-500 uppercase tracking-wider">${t('nodeModal.add_node_header')}</p>
              ${filtered.length > 0 ? `
                <button class="text-xs text-primary hover:text-primary-darker font-medium" onclick="toggleAllNodeSelection()">
                  ${m.selectedNodeIds.length === filtered.length && filtered.length > 0 ? t('nodeModal.deselect_all') : t('nodeModal.select_all')}
                </button>
              ` : ''}
            </div>

            <div class="relative mb-3">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" class="form-input pl-9 text-sm" placeholder="${t('nodeModal.search_placeholder')}"
                value="${m.search}" oninput="setNodeSearch(this.value)" />
            </div>

            ${filtered.length === 0 ? `
              <div class="text-center py-8 text-neutral-400 text-sm border border-dashed border-neutral-200 rounded-xl">
                ${search ? t('nodeModal.no_results_search') : t('nodeModal.all_added')}
              </div>
            ` : `
              <div class="border border-neutral-200 rounded-xl overflow-hidden divide-y divide-neutral-100" style="max-height:220px;overflow-y:auto">
                ${filtered.map(node => {
                  const sel = m.selectedNodeIds.includes(node.id);
                  return `
                    <label class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-primary-lighter/50 transition-colors ${sel ? 'bg-primary-lighter/30' : ''}">
                      <input type="checkbox" class="flex-shrink-0" ${sel ? 'checked' : ''}
                        onchange="toggleNodeSelection(${node.id}, this.checked)" />
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-neutral-700">${node.name}</p>
                        <p class="text-xs text-neutral-400 font-mono">${node.code}</p>
                      </div>
                    </label>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>

        <div class="flex items-center justify-between px-6 py-4 border-t border-neutral-100 bg-neutral-50/50 flex-shrink-0">
          <span class="text-sm text-neutral-500">
            ${selCount > 0 ? t('nodeModal.selected_count', { n: `<strong class="text-primary">${selCount}</strong>` }) : t('nodeModal.none_selected')}
          </span>
          <div class="flex items-center gap-2">
            <button class="secondary-btn py-2" onclick="closeNodeModal()">${t('common.close')}</button>
            <button class="primary-btn py-2" onclick="addSelectedNodes(${cred.id})" ${selCount === 0 ? 'disabled' : ''}>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              ${selCount > 0 ? t('nodeModal.add_btn', { n: selCount }) : t('nodeModal.add_btn_empty')}
            </button>
          </div>
        </div>

      </div>
    </div>
  `;
}

// =========================================================
// ACTIONS — LIST
// =========================================================
function setFilter(status) {
  S.filterStatus = status;
  render();
}

function openWizard(id) {
  S.errors = {};
  S.validationResults = {};
  S.validating = false;

  if (id === null) {
    S.editingId = null;
    S.step = 1;
    S.f = {
      companyId: '', name: '', isDefault: false,
      minDesi: '', maxDesi: '',
      minOrderAmount: '', maxOrderAmount: '',
      orderShipping: true, returnShipping: true, transferShipping: false,
      productTypes: [], customerSegments: [], packageTypes: [], channels: [], paymentTypes: [],
      coveredRegions: [],
      search2: '', activeProvinceId2: '',
      credentials: [],
    };
  } else {
    const c = contracts.find(x => x.id === id);
    S.editingId = id;
    S.step = 1;
    S.f = {
      companyId: c.companyId,
      name: c.name,
      isDefault: !!c.isDefault,
      minDesi: c.minDesi,
      maxDesi: c.maxDesi,
      minOrderAmount: c.minOrderAmount,
      maxOrderAmount: c.maxOrderAmount,
      orderShipping: c.orderShipping,
      returnShipping: c.returnShipping,
      transferShipping: !!c.transferShipping,
      productTypes: [...(c.productTypes || [])],
      customerSegments: [...(c.customerSegments || [])],
      packageTypes: [...(c.packageTypes || [])],
      channels: [...(c.channels || [])],
      paymentTypes: [...(c.paymentTypes || [])],
      coveredRegions: JSON.parse(JSON.stringify(c.coveredRegions)),
      search2: '', activeProvinceId2: '',
      credentials: JSON.parse(JSON.stringify(c.credentials)),
    };
  }
  S.view = 'wizard';
  render();
}

function backToList() {
  S.view = 'list';
  render();
}

function toggleStatus(id) {
  const c = contracts.find(x => x.id === id);
  c.status = c.status === 'active' ? 'passive' : 'active';
  toast(c.status === 'active' ? t('toast.contract_activated', { name: c.name }) : t('toast.contract_deactivated', { name: c.name }), c.status === 'active' ? 'success' : 'info');
  render();
}

function confirmDelete(id) {
  S.deleteModal = { show: true, id };
  render();
}

function closeDeleteModal() {
  S.deleteModal.show = false;
  render();
}

function deleteContract() {
  const c = contracts.find(x => x.id === S.deleteModal.id);
  contracts = contracts.filter(x => x.id !== S.deleteModal.id);
  S.deleteModal.show = false;
  toast(t('toast.contract_deleted', { name: c.name }), 'info');
  render();
}

function exportContractsCsv() {
  if (contracts.length === 0) { toast('Dışa aktarılacak sözleşme bulunamadı.', 'warning'); return; }
  const headers = ['Firma', 'Sözleşme Adı', 'Varsayılan', 'Sipariş', 'İade', 'Transfer', 'Min Desi', 'Max Desi', 'Durum', 'Tarih'];
  const rows = contracts.map(c => {
    const co = getCompany(c.companyId);
    return [
      co ? co.name : '', c.name, c.isDefault ? 'Evet' : 'Hayır',
      c.orderShipping ? 'Evet' : 'Hayır', c.returnShipping ? 'Evet' : 'Hayır', c.transferShipping ? 'Evet' : 'Hayır',
      c.minDesi, c.maxDesi, c.status === 'active' ? 'Aktif' : 'Pasif', fmtDate(c.createdAt),
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kargo_firmalari_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`${contracts.length} sözleşme CSV olarak indirildi.`, 'success');
}

// =========================================================
// ACTIONS — WIZARD FORM
// =========================================================
function setField(field, val) {
  S.f[field] = val;
  if (S.errors[field]) {
    delete S.errors[field];
    render();
  }
}

function toggleField(field) {
  S.f[field] = !S.f[field];
  if (S.errors.shippingType) delete S.errors.shippingType;
  render();
}

function nextStep() {
  const errs = validateStep(S.step);
  if (Object.keys(errs).length) {
    S.errors = errs;
    render();
    return;
  }
  S.errors = {};
  S.step++;
  render();
}

function prevStep() {
  S.errors = {};
  S.step--;
  render();
}

function validateStep(step) {
  const f = S.f;
  const errs = {};
  if (step === 1) {
    if (!f.companyId) errs.companyId = t('validation.company_required');
    if (f.minDesi === '' || f.minDesi === null) errs.minDesi = t('validation.min_desi_required');
    if (f.maxDesi === '' || f.maxDesi === null) errs.maxDesi = t('validation.max_desi_required');
    if (errs.minDesi === undefined && errs.maxDesi === undefined) {
      if (+f.minDesi < 0) errs.minDesi = t('validation.negative_value');
      if (+f.maxDesi < 0) errs.maxDesi = t('validation.negative_value');
      if (+f.minDesi >= +f.maxDesi) errs.minDesi = t('validation.min_desi_lt_max');
    }
    if (f.minOrderAmount !== '' && f.maxOrderAmount !== '' && +f.minOrderAmount >= +f.maxOrderAmount) {
      errs.minOrderAmount = t('validation.min_amount_lt_max');
    }
    if (!f.orderShipping && !f.returnShipping) {
      errs.shippingType = t('validation.shipping_type_required');
    }
  }
  return errs;
}

// =========================================================
// ACTIONS — STEP 2
// =========================================================
function setStep2Search(val) {
  S.f.search2 = val;
  render();
}

function activateProvince2(provId) {
  S.f.activeProvinceId2 = +provId;
  render();
}

function toggleProvinceInCoverage(provId) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);
  if (idx >= 0) {
    S.f.coveredRegions.splice(idx, 1);
  } else {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [] });
  }
  render();
}

function toggleDistrictInCoverage(provId, districtName) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);

  if (idx < 0) {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [districtName] });
  } else {
    const entry = S.f.coveredRegions[idx];
    if (entry.districts.length === 0) {
      entry.districts = prov.districts.filter(d => d !== districtName);
      if (entry.districts.length === 0) S.f.coveredRegions.splice(idx, 1);
    } else {
      const dIdx = entry.districts.indexOf(districtName);
      if (dIdx >= 0) {
        entry.districts.splice(dIdx, 1);
        if (entry.districts.length === 0) S.f.coveredRegions.splice(idx, 1);
      } else {
        entry.districts.push(districtName);
        if (entry.districts.length === prov.districts.length) entry.districts = [];
      }
    }
  }

  S.f.activeProvinceId2 = provId;
  render();
}

function toggleAllProvinces2() {
  const allSel = S.f.coveredRegions.length === PROVINCES.length && S.f.coveredRegions.every(r => r.districts.length === 0);
  S.f.coveredRegions = allSel ? [] : PROVINCES.map(p => ({ provinceId: p.id, provinceName: p.name, districts: [] }));
  render();
}

function toggleAllDistricts2(provId) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);
  if (idx < 0) {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [] });
  } else {
    const entry = S.f.coveredRegions[idx];
    if (entry.districts.length === 0) {
      S.f.coveredRegions.splice(idx, 1);
    } else {
      entry.districts = [];
    }
  }
  render();
}

function removeCoveredRegion2(provId) {
  S.f.coveredRegions = S.f.coveredRegions.filter(r => r.provinceId !== +provId);
  render();
}

function clearAllCoverage2() {
  S.f.coveredRegions = [];
  render();
}

// =========================================================
// ACTIONS — STEP 3
// =========================================================
function addCredential() {
  S.f.credentials.push({
    id: newCredId(),
    name: `Credential ${S.f.credentials.length + 1}`,
    password: '', apiKey: '', customerId: '',
    nodes: [],
  });
  render();
}

function deleteCred(id) {
  const cred = S.f.credentials.find(c => c.id === id);
  if (!cred) return;
  if (cred.nodes.length > 0) {
    if (!confirm(t('toast.confirm_delete_credential', { name: cred.name, n: cred.nodes.length }))) return;
  }
  S.f.credentials = S.f.credentials.filter(c => c.id !== id);
  render();
}

function updateCred(id, field, val) {
  const cred = S.f.credentials.find(c => c.id === id);
  if (cred) cred[field] = val;
}

function togglePass(id) {
  S.showPass[id] = !S.showPass[id];
  render();
}

function openNodeModal(credId) {
  S.nodeModal = { show: true, credId, selectedNodeIds: [], search: '' };
  render();
}

function closeNodeModal() {
  S.nodeModal.show = false;
  render();
}

function setNodeSearch(val) {
  S.nodeModal.search = val;
  S.nodeModal.selectedNodeIds = [];
  render();
}

function toggleNodeSelection(nodeId, checked) {
  if (checked) {
    if (!S.nodeModal.selectedNodeIds.includes(nodeId)) S.nodeModal.selectedNodeIds.push(nodeId);
  } else {
    S.nodeModal.selectedNodeIds = S.nodeModal.selectedNodeIds.filter(id => id !== nodeId);
  }
  const footer = document.querySelector('.modal-box .border-t');
  if (footer) {
    const n = S.nodeModal.selectedNodeIds.length;
    const countEl = footer.querySelector('span');
    if (countEl) countEl.innerHTML = n > 0 ? t('nodeModal.selected_count', { n: `<strong class="text-primary">${n}</strong>` }) : t('nodeModal.none_selected');
    const addBtn = footer.querySelector('.primary-btn');
    if (addBtn) {
      addBtn.disabled = n === 0;
      addBtn.innerHTML = n > 0
        ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> ${t('nodeModal.add_btn', { n })}`
        : `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> ${t('nodeModal.add_btn_empty')}`;
    }
  }
}

function toggleAllNodeSelection() {
  const cred = S.f.credentials.find(c => c.id === S.nodeModal.credId);
  const addedIds = new Set(cred ? cred.nodes.map(n => n.id) : []);
  const search = S.nodeModal.search.toLowerCase();
  const available = NODES.filter(n =>
    !addedIds.has(n.id) &&
    (search === '' || n.name.toLowerCase().includes(search) || n.code.toLowerCase().includes(search))
  );
  if (S.nodeModal.selectedNodeIds.length === available.length) {
    S.nodeModal.selectedNodeIds = [];
  } else {
    S.nodeModal.selectedNodeIds = available.map(n => n.id);
  }
  render();
}

function addSelectedNodes(credId) {
  const cred = S.f.credentials.find(c => c.id === credId);
  if (!cred) return;
  const addedIds = new Set(cred.nodes.map(n => n.id));
  const toAdd = NODES.filter(n => S.nodeModal.selectedNodeIds.includes(n.id) && !addedIds.has(n.id));
  if (!toAdd.length) {
    toast(t('toast.node_selection_required'), 'warning');
    return;
  }
  cred.nodes.push(...toAdd.map(n => ({ ...n })));
  S.nodeModal.selectedNodeIds = [];
  toast(t('toast.nodes_added', { n: toAdd.length }), 'success');
  render();
}

function deleteNode(credId, nodeId) {
  const cred = S.f.credentials.find(c => c.id === credId);
  if (!cred) return;
  cred.nodes = cred.nodes.filter(n => n.id !== nodeId);
  render();
}

// =========================================================
// SAVE / API VALIDATION
// =========================================================
function saveContract() {
  S.validating = true;
  S.validationResults = {};
  render();

  const creds = S.f.credentials;
  if (creds.length === 0) {
    finalizeSave(true);
    return;
  }

  let done = 0;
  let allOk = true;

  creds.forEach(cred => {
    const delay = 800 + Math.random() * 1000;
    const ok = Math.random() > 0.15;
    setTimeout(() => {
      S.validationResults[cred.id] = ok ? 'ok' : 'error';
      if (!ok) allOk = false;
      done++;
      if (done === creds.length) {
        S.validating = false;
        render();
        if (allOk) {
          finalizeSave(true);
        } else {
          toast(t('toast.credential_api_error'), 'error');
        }
      } else {
        render();
      }
    }, delay);
  });
}

function finalizeSave(success) {
  if (!success) return;
  const f = S.f;
  const extraFields = {
    isDefault: f.isDefault, transferShipping: f.transferShipping,
    productTypes: f.productTypes, customerSegments: f.customerSegments,
    packageTypes: f.packageTypes, channels: f.channels, paymentTypes: f.paymentTypes,
  };
  if (f.isDefault) contracts.forEach(c => { c.isDefault = false; });

  if (S.editingId !== null) {
    const idx = contracts.findIndex(c => c.id === S.editingId);
    contracts[idx] = {
      ...contracts[idx],
      companyId: +f.companyId,
      orderShipping: f.orderShipping, returnShipping: f.returnShipping,
      minDesi: +f.minDesi, maxDesi: +f.maxDesi,
      minOrderAmount: f.minOrderAmount !== '' ? +f.minOrderAmount : '',
      maxOrderAmount: f.maxOrderAmount !== '' ? +f.maxOrderAmount : '',
      coveredRegions: f.coveredRegions,
      credentials: f.credentials,
      ...extraFields,
    };
    toast(t('toast.contract_updated', { name: f.name }), 'success');
  } else {
    const _co = getCompany(+f.companyId);
    const _sameCount = contracts.filter(c => c.companyId === +f.companyId).length;
    const _autoName = _co ? (_sameCount > 0 ? `${_co.name} #${_sameCount + 1}` : _co.name) : t('contracts.title_singular');
    contracts.push({
      id: newContractId(),
      companyId: +f.companyId, name: _autoName,
      status: 'active',
      createdAt: new Date().toISOString().split('T')[0],
      orderShipping: f.orderShipping, returnShipping: f.returnShipping,
      minDesi: +f.minDesi, maxDesi: +f.maxDesi,
      minOrderAmount: f.minOrderAmount !== '' ? +f.minOrderAmount : '',
      maxOrderAmount: f.maxOrderAmount !== '' ? +f.maxOrderAmount : '',
      coveredRegions: f.coveredRegions,
      credentials: f.credentials,
      ...extraFields,
    });
    toast(t('toast.contract_created', { name: f.name }), 'success');
  }
  S.view = 'list';
  render();
}

// =========================================================
// TOAST
// =========================================================
function toast(msg, type = 'info') {
  const container = document.getElementById('toasts');
  if (!container) return;

  const colors = {
    success: { bg: '#e3f7ec', border: '#84ebb4', text: '#0b4627', icon: '#1fc16b' },
    error:   { bg: '#ffebec', border: '#ffc0c5', text: '#681219', icon: '#fb3748' },
    warning: { bg: '#fff3eb', border: '#ffd9c0', text: '#71330a', icon: '#fa7319' },
    info:    { bg: '#ebf1ff', border: '#c0d5ff', text: '#182f8b', icon: '#335cff' },
  };
  const c = colors[type] || colors.info;

  const icons = {
    success: 'M5 13l4 4L19 7',
    error:   'M6 18L18 6M6 6l12 12',
    warning: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z',
    info:    'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
  };

  const el = document.createElement('div');
  el.className = 'toast';
  el.style.cssText = `background:${c.bg};border:1.5px solid ${c.border};color:${c.text};border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;font-size:13px;box-shadow:0 16px 32px -12px #0e121b1a`;
  el.innerHTML = `
    <svg style="width:16px;height:16px;color:${c.icon};flex-shrink:0;margin-top:1px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="${icons[type]}"/>
    </svg>
    <span>${msg}</span>
  `;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('exit'); setTimeout(() => el.remove(), 300); }, 3500);
}

function bindEvents() {
  // All events are inline onclick
}

render();
</script>
