function emailFor(name) {
  const ascii = name.toLowerCase()
    .replace(/ı/g, 'i').replace(/i̇/g, 'i').replace(/ş/g, 's').replace(/ğ/g, 'g')
    .replace(/ü/g, 'u').replace(/ö/g, 'o').replace(/ç/g, 'c');
  return ascii.trim().split(/\s+/).join('.') + '@example.com';
}

function phoneFor(shipmentId) {
  return `+90 5${String(30000000 + shipmentId * 777).padStart(8, '0')}`;
}

function relativeTimeTr(iso) {
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'az önce';
  if (mins < 60) return `${mins} dakika önce`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours} saat önce`;
  const days = Math.floor(hours / 24);
  return `${days} gün önce`;
}

function copyToClipboard(text) {
  const finish = () => toast(t('toast.copied'), 'success');
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(String(text)).then(finish).catch(() => fallbackCopy(text, finish));
  } else {
    fallbackCopy(text, finish);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = String(text);
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  cb();
}

function copyBtn(value) {
  const safe = String(value).replace(/'/g, "\\'");
  return `<button class="text-neutral-300 hover:text-primary transition-colors flex-shrink-0" onclick="event.stopPropagation(); copyToClipboard('${safe}')" title="Kopyala">

function t(key, vars) {
  const dict = I18N[S.lang] || I18N.tr;
  let str = dict[key] !== undefined ? dict[key] : (I18N.tr[key] !== undefined ? I18N.tr[key] : key);
  if (vars) {
    Object.keys(vars).forEach(k => { str = str.split('{' + k + '}').join(vars[k]); });
  }
  return str;
}

function newCredId()     { return ++S._credSeq; }
function newNodeId()     { return ++S._nodeSeq; }
function newContractId() { return Math.max(0, ...contracts.map(c => c.id)) + 1; }

function getCompany(id)  { return COMPANIES.find(c => c.id === +id); }
function getProvince(id) { return PROVINCES.find(p => p.id === +id); }
function fmtDate(d)      { return d ? new Date(d).toLocaleDateString('tr-TR') : '-'; }
function fmtDateTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return { time: `${pad(d.getHours())}:${pad(d.getMinutes())}`, date: `${pad(d.getDate())}.${pad(d.getMonth() + 1)}.${d.getFullYear()}` };
}
function fmtDateTimeStr(iso) {
  const { time, date } = fmtDateTime(iso);
  return `${time} · ${date}`;
}

// Returns every (kargo firması, credential, sözleşme) combination a node is attached to.
function getNodeUsage(nodeId) {
  const usage = [];
  contracts.forEach(c => {
    const co = getCompany(c.companyId);
    c.credentials.forEach(cred => {
      if (cred.nodes.some(n => n.id === nodeId)) {
        usage.push({
          companyId: c.companyId,
          companyName: co ? co.name : t('common.unknown'),
          credentialName: cred.name,
          contractId: c.id,
          contractName: c.name,
          contractStatus: c.status,
        });
      }
    });
  });
  return usage;
}

  return `
    <div>
      <div class="flex items-center justify-between px-5 py-3.5 cursor-pointer hover:bg-neutral-50/80 transition-colors" onclick="toggleNodeRow(${node.id})">

          </div>

        </div>
        <div class="flex items-center gap-3">
          ${companyCount > 0
            ? `<span class="text-xs font-medium text-neutral-600 bg-neutral-100 px-2.5 py-1 rounded-full">${t('nodes.companies_count', { n: companyCount })}</span>`

      </div>
      ${expanded ? `
        <div class="px-5 pb-4 bg-neutral-50/50">
          ${usage.length === 0 ? `
            <div class="text-center py-6 text-neutral-400 text-sm border border-dashed border-neutral-200 rounded-xl">
              ${t('nodes.not_linked_desc')}
            </div>
          ` : `
            <div class="border border-neutral-200 rounded-xl overflow-hidden bg-white">
              <table class="w-full text-sm">
                <thead>
                  <tr class="text-left border-b border-neutral-100">
                    <th class="px-4 py-2.5 text-xs font-semibold text-neutral-400 uppercase tracking-wider">${t('nodes.col_company')}</th>
                    <th class="px-4 py-2.5 text-xs font-semibold text-neutral-400 uppercase tracking-wider">${t('nodes.col_credential')}</th>
                    <th class="px-4 py-2.5 text-xs font-semibold text-neutral-400 uppercase tracking-wider">${t('nodes.col_contract')}</th>
                    <th class="px-4 py-2.5 text-xs font-semibold text-neutral-400 uppercase tracking-wider">${t('nodes.col_status')}</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-neutral-100">
                  ${usage.map(u => `
                    <tr>
                      <td class="px-4 py-2.5 font-medium text-neutral-700">${u.companyName}</td>
                      <td class="px-4 py-2.5 text-neutral-500">${u.credentialName}</td>
                      <td class="px-4 py-2.5">
                        <a class="text-primary hover:text-primary-darker font-medium cursor-pointer" onclick="event.stopPropagation(); viewContractFromNode(${u.contractId})">${u.contractName}</a>
                      </td>
                      <td class="px-4 py-2.5">
                        <span class="badge ${u.contractStatus === 'active' ? 'badge-active' : 'badge-passive'}">

          `}

      ` : ''}

}

function toggleNodeRow(id) {
  S.nodeListExpanded[id] = !S.nodeListExpanded[id];
  render();
}

function setNodeListSearch(val) {
  S.nodeListSearch = val;
  render();
}

function viewContractFromNode(contractId) {
  S.page = 'contracts';
  openWizard(contractId);
}

// GÖNDERİLER
// =========================================================
const SHIPMENT_SEARCH_FIELDS = [
  { key: 'shipmentNo' },
  { key: 'orderNo' },
  { key: 'trackingNo' },
  { key: 'referenceId' },
  { key: 'customerName' },
];

function getStatusTabs() {
  return [
    { key: 'all', label: t('common.all') },
    ...Object.keys(SHIPMENT_STATUS).map(key => ({ key, label: statusLabel(key) })),
  ];
}

function getFilteredShipments() {
  const sh = S.shipments;
  const q = sh.search.trim().toLowerCase();
  return SHIPMENTS.filter(s => {
    if (sh.filterStatus !== 'all' && s.status !== sh.filterStatus) return false;
    if (sh.filterSupplierId && s.companyId !== +sh.filterSupplierId) return false;
    if (sh.filterCargoType && s.cargoType !== sh.filterCargoType) return false;
    if (sh.dateFrom && s.shipTime.slice(0, 10) < sh.dateFrom) return false;
    if (sh.dateTo && s.shipTime.slice(0, 10) > sh.dateTo) return false;
    if (q && !String(s[sh.searchField] ?? '').toLowerCase().includes(q)) return false;
    return true;
  });
}

function cargoTypeChip(type) {
  if (type === 'order') {
    return `<span class="inline-flex items-center gap-1.5 text-xs font-medium text-primary whitespace-nowrap">
      <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/></svg>
      ${cargoTypeLabel('order')}
    </span>`;
  }
  return `<span class="inline-flex items-center gap-1.5 text-xs font-medium whitespace-nowrap" style="color:#7d52f4">
    <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
    ${cargoTypeLabel('return')}
  </span>`;
}

// ── kolonlar (Tabloyu Düzenle) ──
const SHIPMENT_COLUMNS = [
  { key: 'shipmentNo' },
  { key: 'orderNo' },
  { key: 'companyId' },
  { key: 'trackingNo' },
  { key: 'shipFrom' },
  { key: 'shipTo' },
  { key: 'shipTime' },
  { key: 'status' },
  { key: 'cargoType' },
  { key: 'referenceId' },
  { key: 'packageNo' },
  { key: 'customerName' },
  { key: 'channel' },
];

function renderShipmentCell(key, s) {
  const co = getCompany(s.companyId);
  const st = SHIPMENT_STATUS[s.status];
  const dt = fmtDateTime(s.shipTime);
  switch (key) {
    case 'shipmentNo':   return `<a class="text-primary hover:text-primary-darker font-semibold cursor-pointer" onclick="openShipmentDetail(${s.id})">${s.shipmentNo}</a>`;
    case 'orderNo':      return `<span class="text-neutral-600">${s.orderNo}</span>`;
    case 'companyId':    return `<span class="text-neutral-600">${co ? co.name : t('common.unknown')}</span>`;
    case 'trackingNo':   return `<span class="text-neutral-500 font-mono text-xs" title="${s.trackingNo}">${s.trackingNo}</span>`;
    case 'shipFrom':     return `<span class="text-neutral-600">${s.shipFrom}</span>`;
    case 'shipTo':       return `<span class="text-neutral-600">${s.shipTo.district} / ${s.shipTo.province}</span>`;
    case 'shipTime':     return `<div class="text-xs"><div class="font-medium text-neutral-700">${dt.time}</div><div class="text-neutral-400">${dt.date}</div></div>`;
    case 'status':       return `<span class="badge ${st.badge}">${statusLabel(s.status)}</span>`;
    case 'cargoType':    return cargoTypeChip(s.cargoType);
    case 'referenceId':  return `<span class="text-neutral-500 text-xs font-mono">${s.referenceId}</span>`;
    case 'packageNo':    return `<span class="text-neutral-500 text-xs font-mono">${s.packageNo}</span>`;
    case 'customerName': return `<span class="text-neutral-600">${s.customerName}</span>`;
    case 'channel':      return `<span class="text-neutral-500">${s.channel}</span>`;
    default:              return '';
  }
}

function buildColumnPanelModal() {
  const vc = S.shipments.visibleColumns;
  const allOn = SHIPMENT_COLUMNS.every(c => vc[c.key] !== false);
  return `
    <div class="overlay" onclick="if(event.target===this)closeColumnPanel()">
      <div class="modal-box w-full max-w-md flex flex-col" style="max-height:85vh">
        <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-100 flex-shrink-0">
          <div>
            <h3 class="font-semibold text-neutral-950">${t('columnPanel.title')}</h3>
            <p class="text-xs text-neutral-400 mt-0.5">${t('columnPanel.desc')}</p>
          </div>
          <button class="text-neutral-400 hover:text-neutral-600 p-1 rounded-lg hover:bg-neutral-100 transition-colors" onclick="closeColumnPanel()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="overflow-y-auto flex-1 px-6 py-5">
          <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-neutral-50 cursor-pointer mb-1">

            <span class="text-sm font-semibold text-neutral-950">${t('columnPanel.select_all')}</span>
          </label>
          <div class="border-t border-neutral-100 my-2"></div>
          ${SHIPMENT_COLUMNS.map(c => `
            <label class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-neutral-50 cursor-pointer">
              <input type="checkbox" ${vc[c.key] !== false ? 'checked' : ''} onchange="toggleShipmentColumn('${c.key}', this.checked)" />
              <span class="text-sm text-neutral-700">${t('column.' + c.key)}</span>

          `).join('')}
          <div class="border-t border-neutral-100 my-2"></div>
          <div class="flex items-center gap-3 px-3 py-2.5 opacity-60">

            <span class="text-sm text-neutral-500">${t('columnPanel.actions_always_visible')} <span class="text-xs">${t('columnPanel.always_visible_hint')}</span></span>
          </div>
        </div>
        <div class="flex items-center justify-end px-6 py-4 border-t border-neutral-100 bg-neutral-50/50 flex-shrink-0">
          <button class="primary-btn py-2" onclick="closeColumnPanel()">${t('common.close')}</button>
        </div>
      </div>
    </div>
  `;
}

function buildShipmentsPage() {
  const sh = S.shipments;
  if (sh.view === 'detail') return buildShipmentDetail();

  const list = getFilteredShipments();
  const selectedCount = sh.selectedIds.length;
  const extraFiltersActive = !!(sh.filterSupplierId || sh.filterCargoType || sh.dateFrom || sh.dateTo);
  const activeCols = SHIPMENT_COLUMNS.filter(c => sh.visibleColumns[c.key] !== false);

  const totalPages = Math.max(1, Math.ceil(list.length / sh.pageSize));
  if (sh.page > totalPages) sh.page = totalPages;
  const pageStart = (sh.page - 1) * sh.pageSize;
  const pageList = list.slice(pageStart, pageStart + sh.pageSize);
  const allVisibleSelected = pageList.length > 0 && pageList.every(s => sh.selectedIds.includes(s.id));

  return `
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-xl font-semibold text-neutral-950 tracking-tight">${t('shipments.title')}</h1>
        <p class="text-sm text-neutral-500 mt-0.5">${t('shipments.count', { n: list.length })}</p>
      </div>
      <div class="flex items-center gap-2">
        <button class="secondary-btn" onclick="exportShipmentsCsv()">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          ${t('shipments.export_csv')}
        </button>
        <button class="primary-btn" onclick="bulkBarcode()" ${selectedCount === 0 ? 'disabled' : ''}>
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 5v14M8 5v14M11 5v14M15 5v14M18 5v14M21 5v14"/></svg>
          ${t('shipments.barcode_bulk')}${selectedCount > 0 ? ` (${selectedCount})` : ''}
        </button>
      </div>
    </div>

    <div class="bg-white rounded-xl border border-neutral-200 overflow-hidden" style="box-shadow:0 1px 2px 0 #0a0d1408">

      <div class="flex items-center gap-1.5 px-5 py-3 border-b border-neutral-100 flex-wrap">
        ${getStatusTabs().map(tab => {
          const count = tab.key === 'all' ? SHIPMENTS.length : SHIPMENTS.filter(s => s.status === tab.key).length;
          return `
            <button class="filter-tab ${sh.filterStatus === tab.key ? 'active' : ''}" onclick="setShipmentStatusFilter('${tab.key}')">
              ${tab.label}
              <span class="ml-1 text-xs opacity-60">${count}</span>
            </button>
          `;
        }).join('')}
      </div>

      <div class="flex items-center gap-3 px-5 py-3 border-b border-neutral-100 flex-wrap">
        <select class="form-input" style="width:190px" onchange="setShipmentSearchField(this.value)">
          ${SHIPMENT_SEARCH_FIELDS.map(f => `<option value="${f.key}" ${sh.searchField === f.key ? 'selected' : ''}>${t('search.' + f.key)}</option>`).join('')}
        </select>
        <div class="relative flex-1" style="min-width:220px">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" class="form-input pl-9" placeholder="${t('shipments.search_placeholder')}" value="${sh.search}" oninput="setShipmentSearch(this.value)" />
        </div>
        <button class="secondary-btn" onclick="toggleShipmentFilters()">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
          ${t('shipments.filters')}
          ${extraFiltersActive ? `<span class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full leading-none">●</span>` : ''}
        </button>
        <button class="secondary-btn" onclick="toggleColumnPanel()">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="7" height="16" rx="1.5"/><rect x="14" y="4" width="7" height="16" rx="1.5"/></svg>
          ${t('shipments.edit_table')}
        </button>
        ${(extraFiltersActive || sh.search || sh.filterStatus !== 'all') ? `<button class="text-xs text-primary hover:text-primary-darker font-medium" onclick="resetShipmentFilters()">${t('shipments.clear_filters')}</button>` : ''}
      </div>

      ${sh.showFilters ? `
        <div class="grid grid-cols-3 gap-4 px-5 py-4 border-b border-neutral-100 bg-neutral-50/50">
          <div>
            <label class="form-label">${t('shipments.supplier')}</label>
            <select class="form-input" onchange="setShipmentFilter('filterSupplierId', this.value)">

            </select>
          </div>
          <div>
            <label class="form-label">${t('shipments.cargo_type')}</label>
            <select class="form-input" onchange="setShipmentFilter('filterCargoType', this.value)">
              <option value="">${t('common.all')}</option>
              <option value="order"  ${sh.filterCargoType === 'order'  ? 'selected' : ''}>${cargoTypeLabel('order')}</option>
              <option value="return" ${sh.filterCargoType === 'return' ? 'selected' : ''}>${cargoTypeLabel('return')}</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div>
              <label class="form-label">${t('shipments.date_from')}</label>
              <input type="date" class="form-input" value="${sh.dateFrom}" onchange="setShipmentFilter('dateFrom', this.value)" />

            <div>
              <label class="form-label">${t('shipments.date_to')}</label>
              <input type="date" class="form-input" value="${sh.dateTo}" onchange="setShipmentFilter('dateTo', this.value)" />
            </div>
          </div>
        </div>
      ` : ''}

      ${list.length === 0 ? `
        <div class="py-16 text-center">
          <svg class="w-10 h-10 text-neutral-300 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          <p class="text-neutral-400 text-sm">${t('shipments.not_found')}</p>
        </div>
      ` : `
        <div class="overflow-x-auto">
          <table class="w-full text-sm" style="min-width:${Math.max(700, activeCols.length * 130 + 260)}px">

              <tr class="text-left border-b border-neutral-100">

                ${activeCols.map(c => `<th class="px-4 py-3 text-xs font-semibold text-neutral-400 uppercase tracking-wider whitespace-nowrap">${t('column.' + c.key)}</th>`).join('')}

              </tr>
            </thead>
            <tbody>
              ${pageList.map((s, i) => buildShipmentRow(s, i, activeCols)).join('')}
            </tbody>
          </table>
        </div>

        <div class="flex items-center justify-between px-5 py-3 border-t border-neutral-100 flex-wrap gap-3">
          <p class="text-xs text-neutral-400">${t('shipments.pagination_summary', { from: pageStart + 1, to: Math.min(pageStart + sh.pageSize, list.length), total: list.length })}</p>
          <div class="flex items-center gap-1">
            <button class="w-8 h-8 rounded-lg flex items-center justify-center text-neutral-500 hover:bg-neutral-100 transition-colors disabled:opacity-30 disabled:hover:bg-transparent disabled:cursor-not-allowed" onclick="setShipmentPage(${sh.page - 1})" ${sh.page <= 1 ? 'disabled' : ''}>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
            </button>
            ${buildPaginationNumbers(sh.page, totalPages).map(p => p === '...'
              ? `<span class="w-8 h-8 flex items-center justify-center text-neutral-300 text-xs">…</span>`
              : `<button class="w-8 h-8 rounded-lg text-xs font-medium transition-colors ${p === sh.page ? 'bg-primary text-white' : 'text-neutral-500 hover:bg-neutral-100'}" onclick="setShipmentPage(${p})">${p}</button>`
            ).join('')}
            <button class="w-8 h-8 rounded-lg flex items-center justify-center text-neutral-500 hover:bg-neutral-100 transition-colors disabled:opacity-30 disabled:hover:bg-transparent disabled:cursor-not-allowed" onclick="setShipmentPage(${sh.page + 1})" ${sh.page >= totalPages ? 'disabled' : ''}>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>

          </div>
        </div>
      `}
    </div>

    ${sh.showColumnPanel ? buildColumnPanelModal() : ''}
  `;
}

function buildPaginationNumbers(current, total) {
  const pages = [];
  if (total <= 7) {
    for (let p = 1; p <= total; p++) pages.push(p);
    return pages;
  }
  pages.push(1);
  if (current > 3) pages.push('...');
  for (let p = Math.max(2, current - 1); p <= Math.min(total - 1, current + 1); p++) pages.push(p);
  if (current < total - 2) pages.push('...');
  pages.push(total);
  return pages;
}

// ── actions ──
function setShipmentSearch(val)      { S.shipments.search = val; S.shipments.page = 1; render(); }
function setShipmentSearchField(val) { S.shipments.searchField = val; S.shipments.page = 1; render(); }
function setShipmentStatusFilter(status) { S.shipments.filterStatus = status; S.shipments.page = 1; render(); }
function toggleShipmentFilters()     { S.shipments.showFilters = !S.shipments.showFilters; render(); }
function setShipmentFilter(key, val) { S.shipments[key] = val; S.shipments.page = 1; render(); }

function setShipmentPage(p) {
  const sh = S.shipments;
  const totalPages = Math.max(1, Math.ceil(getFilteredShipments().length / sh.pageSize));
  sh.page = Math.min(Math.max(1, p), totalPages);
  render();
}

function toggleColumnPanel() { S.shipments.showColumnPanel = !S.shipments.showColumnPanel; render(); }
function closeColumnPanel()  { S.shipments.showColumnPanel = false; render(); }
function toggleShipmentColumn(key, checked) { S.shipments.visibleColumns[key] = checked; render(); }
function toggleAllShipmentColumns(checked) {
  SHIPMENT_COLUMNS.forEach(c => { S.shipments.visibleColumns[c.key] = checked; });
  render();
}

function resetShipmentFilters() {
  S.shipments.search = '';
  S.shipments.filterStatus = 'all';
  S.shipments.filterSupplierId = '';
  S.shipments.filterCargoType = '';
  S.shipments.dateFrom = '';
  S.shipments.dateTo = '';
  S.shipments.page = 1;
  render();
}

function toggleShipmentSelect(id, checked) {
  if (checked) {
    if (!S.shipments.selectedIds.includes(id)) S.shipments.selectedIds.push(id);
  } else {
    S.shipments.selectedIds = S.shipments.selectedIds.filter(x => x !== id);
  }
  render();
}

function toggleSelectAllShipments(checked) {
  const sh = S.shipments;
  const pageStart = (sh.page - 1) * sh.pageSize;
  const visibleIds = getFilteredShipments().slice(pageStart, pageStart + sh.pageSize).map(s => s.id);
  if (checked) {
    visibleIds.forEach(id => { if (!S.shipments.selectedIds.includes(id)) S.shipments.selectedIds.push(id); });
  } else {
    S.shipments.selectedIds = S.shipments.selectedIds.filter(id => !visibleIds.includes(id));
  }
  render();
}

function openShipmentDetail(id) {
  S.shipments.view = 'detail';
  S.shipments.detailId = id;
  S.shipments.detailExpanded = {};
  render();
}

function toggleDetailSection(key) {
  S.shipments.detailExpanded[key] = !S.shipments.detailExpanded[key];
  render();
}

function openStatusUpdateModal(id) {
  const s = SHIPMENTS.find(x => x.id === id);
  S.shipments.statusModal = { show: true, id, value: s ? s.status : null };
  render();
}

function closeStatusUpdateModal() {
  S.shipments.statusModal.show = false;
  render();
}

function setStatusModalValue(val) {
  S.shipments.statusModal.value = val;
  render();
}

function applyStatusUpdate() {
  const { id, value } = S.shipments.statusModal;
  const s = SHIPMENTS.find(x => x.id === id);
  if (s) s.status = value;
  S.shipments.statusModal.show = false;
  if (s) toast(t('toast.status_updated', { no: s.shipmentNo, status: statusLabel(value) }), 'success');
  render();
}

function backToShipmentsList() {
  S.shipments.view = 'list';
  S.shipments.detailId = null;
  render();
}

function confirmCancelShipment(id) {
  S.shipments.cancelModal = { show: true, id };
  render();
}

function closeCancelShipmentModal() {
  S.shipments.cancelModal.show = false;
  render();
}

function cancelShipment() {
  const id = S.shipments.cancelModal.id;
  const s = SHIPMENTS.find(x => x.id === id);
  if (s) s.status = 'cancelled';
  S.shipments.cancelModal.show = false;
  if (s) toast(t('toast.shipment_cancelled', { no: s.shipmentNo }), 'info');
  render();
}

function singleBarcode(id) {
  const s = SHIPMENTS.find(x => x.id === id);
  toast(t('toast.barcode_generating_single', { no: s ? s.shipmentNo : '' }), 'info');
  setTimeout(() => toast(t('toast.barcode_ready'), 'success'), 800);
}

function bulkBarcode() {
  const ids = S.shipments.selectedIds;
  if (ids.length === 0) return;
  toast(t('toast.barcode_generating_bulk', { n: ids.length }), 'info');
  setTimeout(() => toast(t('toast.barcode_ready_bulk', { n: ids.length }), 'success'), 900);
}

function csvEscape(val) {
  const s = String(val ?? '');
  return /[;"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportShipmentsCsv() {
  const list = getFilteredShipments();
  if (list.length === 0) { toast(t('toast.csv_none'), 'warning'); return; }

  const headers = SHIPMENT_COLUMNS.map(c => t('column.' + c.key));
  const rows = list.map(s => [
    s.shipmentNo, s.orderNo, getCompany(s.companyId)?.name || '', s.trackingNo, s.shipFrom,
    `${s.shipTo.district} / ${s.shipTo.province}`, fmtDateTimeStr(s.shipTime), statusLabel(s.status),
    cargoTypeLabel(s.cargoType), s.referenceId, s.packageNo, s.customerName, s.channel,
  ]);
  const csv = [headers, ...rows].map(r => r.map(csvEscape).join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${S.lang === 'tr' ? 'gonderiler' : 'shipments'}_${new Date().toISOString().slice(0, 10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(t('toast.csv_done', { n: list.length }), 'success');
}

function buildApp() {
  if (S.page === 'shipments') {
    return `<div class="max-w-6xl mx-auto px-4 py-8">${buildShipmentsPage()}</div>`;
  }
  if (S.page === 'nodes') {
    return `<div class="max-w-6xl mx-auto px-4 py-8">${buildNodesPage()}</div>`;
  }
  if (S.page !== 'contracts') {
    return buildEmptyPage(S.page);
  }
  return `
    <div class="max-w-6xl mx-auto px-4 py-8">
      ${S.view === 'list' ? buildList() : buildWizard()}
    </div>
    ${S.deleteModal.show ? buildDeleteModal() : ''}
    ${S.nodeModal.show   ? buildNodeModal()   : ''}
  `;
}

function buildWizard() {
  const isEdit = S.editingId !== null;

  const STEPS = [
    { label: t('wizard.step1_label'), desc: t('wizard.step1_desc') },
    { label: t('wizard.step2_label'), desc: t('wizard.step2_desc') },

      <div class="flex flex-col">
        ${STEPS.map((s, i) => {
          const n = i + 1;
          const st = n < S.step ? 'done' : n === S.step ? 'active' : 'pending';
          const isLast = i === STEPS.length - 1;
          return `
            <div class="flex gap-3.5">
              <div class="flex flex-col items-center flex-shrink-0">
                <div class="step-circle ${st}">
                  ${st === 'done'
                    ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`
                    : n}

                ${!isLast ? `<div class="w-px flex-1 my-2 ${st === 'done' ? 'bg-primary-light' : 'bg-neutral-200'}" style="min-height:36px"></div>` : ''}
              </div>
              <div class="${isLast ? 'pt-1' : 'pb-8 pt-1'}">
                <p class="text-sm font-semibold leading-snug ${st === 'pending' ? 'text-neutral-400' : st === 'active' ? 'text-primary-dark' : 'text-neutral-950'}">${s.label}</p>
                <p class="text-xs mt-0.5 leading-relaxed ${st === 'pending' ? 'text-neutral-300' : 'text-neutral-400'}">${s.desc}</p>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

  let stepContent = '';

  return `

        ${t('wizard.back_to_list')}
      </button>
      <h1 class="text-xl font-semibold text-neutral-950 tracking-tight">${isEdit ? t('wizard.edit_title') : t('wizard.new_title')}</h1>

        <div class="flex items-center justify-between px-8 py-4 border-t border-neutral-100 bg-neutral-50/60">

            ${S.step < 3
              ? `<button class="primary-btn" onclick="nextStep()">

                 </button>`
              : `<button class="primary-btn" onclick="saveContract()" ${S.validating ? 'disabled' : ''}>
                  ${S.validating

                  }

// =========================================================
// STEP 2
// =========================================================
function buildStep2() {
  const f = S.f;
  const search = (f.search2 || '').toLowerCase().trim();
  const isSearching = search.length > 0;
  const activeProv = getProvince(f.activeProvinceId2);

  function coverage(provId) { return f.coveredRegions.find(r => r.provinceId === provId); }
  function isFull(c)    { return c && c.districts.length === 0; }
  function isPartial(c) { return c && c.districts.length > 0; }

  let totalProv = 0, totalDist = 0;
  f.coveredRegions.forEach(r => {
    totalProv++;
    const p = getProvince(r.provinceId);
    totalDist += r.districts.length === 0 ? (p ? p.districts.length : 0) : r.districts.length;
  });
  const hasSel = f.coveredRegions.length > 0;
  const allProvsSelected = f.coveredRegions.length === PROVINCES.length && f.coveredRegions.every(r => r.districts.length === 0);

  function chkBox(full, partial) {
    if (full)    return `<div style="width:16px;height:16px;border-radius:4px;background:#335cff;border:2px solid #335cff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5l2.5 2.5 4.5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    if (partial) return `<div style="width:16px;height:16px;border-radius:4px;background:#ebf1ff;border:2px solid #335cff;display:flex;align-items:center;justify-content:center;flex-shrink:0"><div style="width:8px;height:2px;background:#335cff;border-radius:1px"></div></div>`;
    return `<div style="width:16px;height:16px;border-radius:4px;background:white;border:1.5px solid #eaecf0;flex-shrink:0"></div>`;
  }

  let searchHTML = '';
  if (isSearching) {
    const hits = [];
    PROVINCES.forEach(p => {
      const c = coverage(p.id);
      if (p.name.toLowerCase().includes(search)) {
        hits.push({ type: 'province', prov: p, checked: !!c, full: isFull(c), partial: isPartial(c) });
      }
      p.districts.forEach(d => {
        if (d.toLowerCase().includes(search)) {
          const distChecked = isFull(c) || (c && c.districts.includes(d));
          hits.push({ type: 'district', prov: p, name: d, checked: distChecked });
        }
      });
    });

    if (!hits.length) {
      searchHTML = `<div style="padding:28px 16px;text-align:center;color:#99a0ae;font-size:13px">${t('step2.no_results')}</div>`;
    } else {
      searchHTML = hits.map(h => {
        if (h.type === 'province') {
          return `<div onclick="toggleProvinceInCoverage(${h.prov.id})" style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f2f5f8" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
            ${chkBox(h.full, h.partial)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:500;color:#0e121b">${h.prov.name}</div>
              <div style="font-size:11.5px;color:#99a0ae">${t('step2.district_count', { n: h.prov.districts.length })}</div>
            </div>
            <span style="font-size:11px;font-weight:500;color:#335cff;background:#ebf1ff;padding:2px 8px;border-radius:999px">${t('step2.province_badge')}</span>
          </div>`;
        } else {
          return `<div onclick="toggleDistrictInCoverage(${h.prov.id}, ${JSON.stringify(h.name).replace(/"/g, '&quot;')})" style="display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-bottom:1px solid #f2f5f8" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
            ${chkBox(h.checked, false)}
            <div style="flex:1;min-width:0">
              <div style="font-size:13.5px;font-weight:500;color:#0e121b">${h.name}</div>
              <div style="font-size:11.5px;color:#99a0ae">${h.prov.name}</div>
            </div>
          </div>`;
        }
      }).join('');
    }
  }

  const provListHTML = PROVINCES.map(p => {
    const c = coverage(p.id);
    const full = isFull(c), partial = isPartial(c);
    const isActive = f.activeProvinceId2 == p.id;
    const countText = full ? t('step2.district_count', { n: p.districts.length }) : partial ? `${c.districts.length}/${p.districts.length}` : '';
    return `<div onclick="activateProvince2(${p.id})" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;${isActive ? 'background:#ebf1ff' : ''}" onmouseover="if(!${isActive})this.style.background='#f5f7fa'" onmouseout="if(!${isActive})this.style.background=''">
      ${chkBox(full, partial)}
      <div style="font-size:13px;flex:1;color:${isActive ? '#1f3bad' : '#0e121b'};font-weight:${isActive ? '600' : '400'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
      ${countText ? `<span style="font-size:11.5px;color:#525866;flex-shrink:0">${countText}</span>` : ''}
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="color:${isActive ? '#335cff' : '#cacfd8'};flex-shrink:0"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');

  let distListHTML = '';
  let activeAllLabel = t('step2.select_all');
  if (activeProv) {
    const c = coverage(activeProv.id);
    const full = isFull(c);
    const allSel = full || (c && c.districts.length === activeProv.districts.length);
    activeAllLabel = allSel ? t('step2.deselect_all') : t('step2.select_all');
    distListHTML = activeProv.districts.map(d => {
      const checked = full || (c && c.districts.includes(d));
      return `<div onclick="toggleDistrictInCoverage(${activeProv.id}, ${JSON.stringify(d).replace(/"/g, '&quot;')})" style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:8px" onmouseover="this.style.background='#f5f7fa'" onmouseout="this.style.background=''">
        ${chkBox(checked, false)}
        <span style="font-size:13px;color:#0e121b">${d}</span>
      </div>`;
    }).join('');
  }

  const chipsHTML = f.coveredRegions.map(r => {
    const label = r.districts.length === 0
      ? r.provinceName
      : r.districts.length === 1
        ? `${r.provinceName} · ${r.districts[0]}`
        : `${r.provinceName} · ${t('step2.district_count', { n: r.districts.length })}`;
    return `<div style="display:inline-flex;align-items:center;gap:6px;background:#f2f5f8;border:1px solid #eaecf0;border-radius:999px;padding:4px 6px 4px 11px">
      <span style="font-size:12px;font-weight:500;color:#0e121b;white-space:nowrap">${label}</span>
      <div onclick="removeCoveredRegion2(${r.provinceId})" style="width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#99a0ae" onmouseover="this.style.background='#ffebec';this.style.color='#fb3748'" onmouseout="this.style.background='';this.style.color='#99a0ae'">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 1.5l7 7M8.5 1.5l-7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;flex-direction:column;gap:14px">

      <div style="position:relative">
        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#99a0ae;pointer-events:none" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" class="form-input" style="padding-left:38px" placeholder="${t('step2.search_placeholder')}"
          value="${f.search2 || ''}" oninput="setStep2Search(this.value)" />
      </div>

      ${isSearching ? `
        <div style="border:1px solid #eaecf0;border-radius:12px;max-height:300px;overflow-y:auto">
          ${searchHTML}
        </div>
      ` : `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;height:296px">

          <div style="border:1px solid #eaecf0;border-radius:12px;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 12px;border-bottom:1px solid #f2f5f8;background:#f5f7fa;flex-shrink:0">
              <span style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#99a0ae">${t('step2.provinces_header')}</span>
              <button onclick="toggleAllProvinces2()" style="font-size:11.5px;font-weight:500;color:#335cff;background:transparent;border:none;cursor:pointer;padding:3px 6px;border-radius:6px;font-family:inherit">
                ${allProvsSelected ? t('step2.deselect_all') : t('step2.select_all')}
              </button>
            </div>
            <div style="flex:1;overflow-y:auto;padding:4px">${provListHTML}</div>
          </div>

          <div style="border:1px solid #eaecf0;border-radius:12px;display:flex;flex-direction:column;overflow:hidden">
            <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 12px;border-bottom:1px solid #f2f5f8;background:#f5f7fa;flex-shrink:0">
              <span style="font-size:13px;font-weight:600;color:#0e121b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                ${activeProv ? activeProv.name : t('step2.districts_header')}
              </span>
              ${activeProv ? `<button onclick="toggleAllDistricts2(${activeProv.id})" style="font-size:11.5px;font-weight:500;color:#335cff;background:transparent;border:none;cursor:pointer;padding:3px 6px;border-radius:6px;font-family:inherit;flex-shrink:0">${activeAllLabel}</button>` : ''}
            </div>
            <div style="flex:1;overflow-y:auto;padding:4px">
              ${activeProv ? distListHTML : `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#cacfd8;text-align:center;padding:16px">
                  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="margin-bottom:8px"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                  <span style="font-size:12.5px">${t('step2.select_province_prompt')}</span>
                </div>
              `}
            </div>
          </div>

        </div>
      `}

      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#99a0ae">${t('step2.covered_regions')}</span>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:12px;color:#525866">${t('step2.coverage_summary', { provinces: totalProv, districts: totalDist })}</span>
            ${hasSel ? `<button onclick="clearAllCoverage2()" style="font-size:11.5px;font-weight:500;color:#fb3748;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:0">${t('step2.clear')}</button>` : ''}
          </div>
        </div>
        ${hasSel
          ? `<div style="display:flex;flex-wrap:wrap;gap:6px;max-height:76px;overflow-y:auto">${chipsHTML}</div>`
          : `<div style="font-size:12.5px;color:#99a0ae;padding:4px 0">${t('step2.no_region_selected')}</div>`
        }
      </div>

    </div>
  `;
}

function buildStep3() {
  const f = S.f;
  const co = getCompany(f.companyId);

  return `
    <div>
      <p class="text-sm text-neutral-500 mb-5">${t('step3.desc')}</p>

      ${f.credentials.length === 0 ? `
        <div class="text-center py-10 text-neutral-400 border border-dashed border-neutral-200 rounded-xl mb-4">
          <svg class="w-10 h-10 mx-auto mb-2 text-neutral-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          <p class="text-sm">${t('step3.no_credentials')}</p>
        </div>
      ` : f.credentials.map(cred => buildCredCard(cred, co)).join('')}

      <button class="w-full mt-3 py-3 border-2 border-dashed border-primary-light rounded-xl text-primary hover:border-primary hover:bg-primary-lighter/50 transition-all text-sm font-medium flex items-center justify-center gap-2"
        onclick="addCredential()">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        ${t('step3.add_credential')}

}

function buildCredCard(cred, co) {
  const fields = co ? co.fields : [];
  const showPw = S.showPass[cred.id];
  const vr = S.validationResults[cred.id];

  const statusBadge = vr === 'ok'
    ? `<span class="badge" style="background:#e3f7ec;color:#178c4e">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        ${t('step3.connection_ok')}
       </span>`
    : vr === 'error'
    ? `<span class="badge" style="background:#ffebec;color:#681219">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        ${t('step3.connection_error')}
       </span>`
    : '';

  return `
    <div class="cred-card mb-4 ${vr === 'error' ? 'border-[#ffc0c5]' : ''}">
      <div class="flex items-center justify-between px-5 py-3.5 bg-neutral-50 border-b border-neutral-100">
        <div class="flex items-center gap-3 flex-1 min-w-0 mr-3">
          <div class="w-8 h-8 rounded-lg bg-primary-lighter flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[11px] text-neutral-400 font-medium mb-0.5">${t('step3.credential_name_label')}</p>
            <input type="text"
              class="w-full text-sm font-semibold text-neutral-950 bg-transparent outline-none border-b-2 border-transparent hover:border-neutral-300 focus:border-primary transition-colors pb-0.5 placeholder-neutral-300"
              value="${cred.name}" placeholder="${t('step3.credential_name_placeholder')}"
              oninput="updateCred(${cred.id}, 'name', this.value)" />
          </div>
        </div>
        <div class="flex items-center gap-2 flex-shrink-0">
          ${statusBadge}
          <button class="text-neutral-400 hover:text-[#fb3748] transition-colors p-1" onclick="deleteCred(${cred.id})" title="${t('step3.delete_credential_tooltip')}">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
      <div class="px-5 py-4 grid grid-cols-2 gap-4">
        ${fields.includes('password') ? `
          <div>
            <label class="form-label">${t('step3.password_label')}</label>
            <div class="relative">
              <input type="${showPw ? 'text' : 'password'}" class="form-input pr-10"
                value="${cred.password || ''}" placeholder="••••••••"
                oninput="updateCred(${cred.id}, 'password', this.value)" />
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600"
                onclick="togglePass(${cred.id})">
                ${showPw
                  ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>`
                  : `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>`
                }
              </button>
            </div>
          </div>
        ` : ''}
        ${fields.includes('apiKey') ? `
          <div>
            <label class="form-label">${t('step3.api_key_label')} <span class="text-[#fb3748]">*</span></label>
            <div class="relative">
              <input type="${showPw ? 'text' : 'password'}" class="form-input pr-10"
                value="${cred.apiKey || ''}" placeholder="••••••••••••"
                oninput="updateCred(${cred.id}, 'apiKey', this.value)" />
              <button class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-neutral-600"
                onclick="togglePass(${cred.id})">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="${showPw ? 'M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21' : 'M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z'}"/></svg>
              </button>
            </div>
          </div>
        ` : ''}
        ${fields.includes('customerId') ? `
          <div>
            <label class="form-label">${t('step3.customer_id_label')} <span class="text-[#fb3748]">*</span></label>
            <input type="text" class="form-input"
              value="${cred.customerId || ''}" placeholder="${t('step3.customer_id_label')}"
              oninput="updateCred(${cred.id}, 'customerId', this.value)" />
          </div>
        ` : ''}
      </div>
      ${vr === 'error' ? `
        <div class="px-5 pb-4">
          <div class="flex items-center gap-2 bg-[#ffebec] border border-[#ffc0c5] text-[#681219] text-xs px-3 py-2 rounded-lg">
            <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            ${t('step3.connection_error_msg')}
          </div>
        </div>
      ` : ''}
      <div class="px-5 pb-4 border-t border-neutral-100 pt-3">
        <button class="w-full flex items-center justify-center gap-2 text-sm font-medium text-primary bg-primary-lighter hover:bg-primary-light border border-primary-light rounded-lg py-2.5 transition-colors" onclick="openNodeModal(${cred.id})">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M12 5l7 7-7 7"/></svg>
          ${t('step3.manage_nodes')}
          <span class="bg-primary text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full leading-none">${cred.nodes.length}</span>
        </button>
      </div>
    </div>
  `;
}

// =========================================================
// NODE MODAL
// =========================================================
function buildNodeModal() {
  const m = S.nodeModal;
  const cred = S.f.credentials.find(c => c.id === m.credId);
  if (!cred) return '';

  const addedIds = new Set(cred.nodes.map(n => n.id));
  const search = m.search.toLowerCase();
  const filtered = NODES.filter(n =>
    !addedIds.has(n.id) &&
    (search === '' || n.name.toLowerCase().includes(search) || n.code.toLowerCase().includes(search))
  );
  const selCount = m.selectedNodeIds.length;

  return `
    <div class="overlay" onclick="if(event.target===this)closeNodeModal()">
      <div class="modal-box w-full max-w-xl flex flex-col" style="max-height:85vh">

        <div class="flex items-center justify-between px-6 py-4 border-b border-neutral-100 flex-shrink-0">
          <div>
            <h3 class="font-semibold text-neutral-950">${t('nodeModal.title')}</h3>
            <p class="text-xs text-neutral-400 mt-0.5">${cred.name}</p>
          </div>
          <button class="text-neutral-400 hover:text-neutral-600 p-1 rounded-lg hover:bg-neutral-100 transition-colors" onclick="closeNodeModal()">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>

        <div class="overflow-y-auto flex-1 px-6 py-5 flex flex-col gap-5">

          <div>
            <div class="flex items-center justify-between mb-2.5">
              <p class="text-xs font-semibold text-neutral-500 uppercase tracking-wider">${t('nodeModal.added_nodes')}</p>
              <span class="text-xs text-neutral-400">${t('nodeModal.node_count', { n: cred.nodes.length })}</span>
            </div>
            ${cred.nodes.length === 0 ? `
              <div class="text-center py-5 border border-dashed border-neutral-200 rounded-xl text-neutral-400 text-sm">
                ${t('nodeModal.no_nodes_added')}
              </div>
            ` : `
              <div class="border border-neutral-200 rounded-xl overflow-hidden divide-y divide-neutral-100">
                ${cred.nodes.map(node => `
                  <div class="flex items-center justify-between px-4 py-3 hover:bg-neutral-50/80 group">
                    <div class="flex items-center gap-3">
                      <div class="w-7 h-7 rounded-lg bg-[#e3f7ec] flex items-center justify-center flex-shrink-0">
                        <svg class="w-3.5 h-3.5 text-[#1fc16b]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                      </div>
                      <div>
                        <p class="text-sm font-medium text-neutral-700">${node.name}</p>
                        <p class="text-xs text-neutral-400 font-mono">${node.code}</p>
                      </div>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-neutral-300 hover:text-[#fb3748] transition-all p-1 rounded" onclick="deleteNode(${cred.id}, ${node.id})">
                      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                `).join('')}
              </div>
            `}
          </div>

          <div>
            <div class="flex items-center justify-between mb-2.5">
              <p class="text-xs font-semibold text-neutral-500 uppercase tracking-wider">${t('nodeModal.add_node_header')}</p>
              ${filtered.length > 0 ? `
                <button class="text-xs text-primary hover:text-primary-darker font-medium" onclick="toggleAllNodeSelection()">
                  ${m.selectedNodeIds.length === filtered.length && filtered.length > 0 ? t('nodeModal.deselect_all') : t('nodeModal.select_all')}
                </button>
              ` : ''}
            </div>

            <div class="relative mb-3">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input type="text" class="form-input pl-9 text-sm" placeholder="${t('nodeModal.search_placeholder')}"
                value="${m.search}" oninput="setNodeSearch(this.value)" />
            </div>

            ${filtered.length === 0 ? `
              <div class="text-center py-8 text-neutral-400 text-sm border border-dashed border-neutral-200 rounded-xl">
                ${search ? t('nodeModal.no_results_search') : t('nodeModal.all_added')}
              </div>
            ` : `
              <div class="border border-neutral-200 rounded-xl overflow-hidden divide-y divide-neutral-100" style="max-height:220px;overflow-y:auto">
                ${filtered.map(node => {
                  const sel = m.selectedNodeIds.includes(node.id);
                  return `
                    <label class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-primary-lighter/50 transition-colors ${sel ? 'bg-primary-lighter/30' : ''}">
                      <input type="checkbox" class="flex-shrink-0" ${sel ? 'checked' : ''}
                        onchange="toggleNodeSelection(${node.id}, this.checked)" />
                      <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-neutral-700">${node.name}</p>
                        <p class="text-xs text-neutral-400 font-mono">${node.code}</p>
                      </div>
                    </label>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>

        <div class="flex items-center justify-between px-6 py-4 border-t border-neutral-100 bg-neutral-50/50 flex-shrink-0">
          <span class="text-sm text-neutral-500">
            ${selCount > 0 ? t('nodeModal.selected_count', { n: `<strong class="text-primary">${selCount}</strong>` }) : t('nodeModal.none_selected')}
          </span>
          <div class="flex items-center gap-2">
            <button class="secondary-btn py-2" onclick="closeNodeModal()">${t('common.close')}</button>
            <button class="primary-btn py-2" onclick="addSelectedNodes(${cred.id})" ${selCount === 0 ? 'disabled' : ''}>
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
              ${selCount > 0 ? t('nodeModal.add_btn', { n: selCount }) : t('nodeModal.add_btn_empty')}
            </button>
          </div>
        </div>

      </div>
    </div>
  `;
}

// =========================================================
// ACTIONS — LIST
// =========================================================
function setFilter(status) {
  S.filterStatus = status;
  render();
}

function openWizard(id) {
  S.errors = {};
  S.validationResults = {};
  S.validating = false;

  if (id === null) {
    S.editingId = null;
    S.step = 1;
    S.f = {
      companyId: '', name: '',
      minDesi: '', maxDesi: '',
      minOrderAmount: '', maxOrderAmount: '',
      orderShipping: true, returnShipping: true,
      coveredRegions: [],
      search2: '', activeProvinceId2: '',
      credentials: [],
    };
  } else {
    const c = contracts.find(x => x.id === id);
    S.editingId = id;
    S.step = 1;
    S.f = {
      companyId: c.companyId,
      name: c.name,
      minDesi: c.minDesi,
      maxDesi: c.maxDesi,
      minOrderAmount: c.minOrderAmount,
      maxOrderAmount: c.maxOrderAmount,
      orderShipping: c.orderShipping,
      returnShipping: c.returnShipping,
      coveredRegions: JSON.parse(JSON.stringify(c.coveredRegions)),
      search2: '', activeProvinceId2: '',
      credentials: JSON.parse(JSON.stringify(c.credentials)),
    };
  }
  S.view = 'wizard';
  render();
}

function backToList() {
  S.view = 'list';
  render();
}

function toggleStatus(id) {
  const c = contracts.find(x => x.id === id);
  c.status = c.status === 'active' ? 'passive' : 'active';
  toast(c.status === 'active' ? t('toast.contract_activated', { name: c.name }) : t('toast.contract_deactivated', { name: c.name }), c.status === 'active' ? 'success' : 'info');
  render();
}

function confirmDelete(id) {
  S.deleteModal = { show: true, id };
  render();
}

function closeDeleteModal() {
  S.deleteModal.show = false;
  render();
}

function deleteContract() {
  const c = contracts.find(x => x.id === S.deleteModal.id);
  contracts = contracts.filter(x => x.id !== S.deleteModal.id);
  S.deleteModal.show = false;
  toast(t('toast.contract_deleted', { name: c.name }), 'info');
  render();
}

// =========================================================
// ACTIONS — WIZARD FORM
// =========================================================
function setField(field, val) {
  S.f[field] = val;
  if (S.errors[field]) {
    delete S.errors[field];
    render();
  }
}

function toggleField(field) {
  S.f[field] = !S.f[field];
  if (S.errors.shippingType) delete S.errors.shippingType;
  render();
}

function nextStep() {
  const errs = validateStep(S.step);
  if (Object.keys(errs).length) {
    S.errors = errs;
    render();
    return;
  }
  S.errors = {};
  S.step++;
  render();
}

function prevStep() {
  S.errors = {};
  S.step--;
  render();
}

function validateStep(step) {
  const f = S.f;
  const errs = {};
  if (step === 1) {
    if (!f.companyId) errs.companyId = t('validation.company_required');
    if (f.minDesi === '' || f.minDesi === null) errs.minDesi = t('validation.min_desi_required');
    if (f.maxDesi === '' || f.maxDesi === null) errs.maxDesi = t('validation.max_desi_required');
    if (errs.minDesi === undefined && errs.maxDesi === undefined) {
      if (+f.minDesi < 0) errs.minDesi = t('validation.negative_value');
      if (+f.maxDesi < 0) errs.maxDesi = t('validation.negative_value');
      if (+f.minDesi >= +f.maxDesi) errs.minDesi = t('validation.min_desi_lt_max');
    }
    if (f.minOrderAmount !== '' && f.maxOrderAmount !== '' && +f.minOrderAmount >= +f.maxOrderAmount) {
      errs.minOrderAmount = t('validation.min_amount_lt_max');
    }
    if (!f.orderShipping && !f.returnShipping) {
      errs.shippingType = t('validation.shipping_type_required');
    }
  }
  return errs;
}

// =========================================================
// ACTIONS — STEP 2
// =========================================================
function setStep2Search(val) {
  S.f.search2 = val;
  render();
}

function activateProvince2(provId) {
  S.f.activeProvinceId2 = +provId;
  render();
}

function toggleProvinceInCoverage(provId) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);
  if (idx >= 0) {
    S.f.coveredRegions.splice(idx, 1);
  } else {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [] });
  }
  render();
}

function toggleDistrictInCoverage(provId, districtName) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);

  if (idx < 0) {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [districtName] });
  } else {
    const entry = S.f.coveredRegions[idx];
    if (entry.districts.length === 0) {
      entry.districts = prov.districts.filter(d => d !== districtName);
      if (entry.districts.length === 0) S.f.coveredRegions.splice(idx, 1);
    } else {
      const dIdx = entry.districts.indexOf(districtName);
      if (dIdx >= 0) {
        entry.districts.splice(dIdx, 1);
        if (entry.districts.length === 0) S.f.coveredRegions.splice(idx, 1);
      } else {
        entry.districts.push(districtName);
        if (entry.districts.length === prov.districts.length) entry.districts = [];
      }
    }
  }

  S.f.activeProvinceId2 = provId;
  render();
}

function toggleAllProvinces2() {
  const allSel = S.f.coveredRegions.length === PROVINCES.length && S.f.coveredRegions.every(r => r.districts.length === 0);
  S.f.coveredRegions = allSel ? [] : PROVINCES.map(p => ({ provinceId: p.id, provinceName: p.name, districts: [] }));
  render();
}

function toggleAllDistricts2(provId) {
  provId = +provId;
  const prov = getProvince(provId);
  const idx = S.f.coveredRegions.findIndex(r => r.provinceId === provId);
  if (idx < 0) {
    S.f.coveredRegions.push({ provinceId: provId, provinceName: prov.name, districts: [] });
  } else {
    const entry = S.f.coveredRegions[idx];
    if (entry.districts.length === 0) {
      S.f.coveredRegions.splice(idx, 1);
    } else {
      entry.districts = [];
    }
  }
  render();
}

function removeCoveredRegion2(provId) {
  S.f.coveredRegions = S.f.coveredRegions.filter(r => r.provinceId !== +provId);
  render();
}

function clearAllCoverage2() {
  S.f.coveredRegions = [];
  render();
}

// =========================================================
// ACTIONS — STEP 3
// =========================================================
function addCredential() {
  S.f.credentials.push({
    id: newCredId(),
    name: `Credential ${S.f.credentials.length + 1}`,
    password: '', apiKey: '', customerId: '',
    nodes: [],
  });
  render();
}

function deleteCred(id) {
  const cred = S.f.credentials.find(c => c.id === id);
  if (!cred) return;
  if (cred.nodes.length > 0) {
    if (!confirm(t('toast.confirm_delete_credential', { name: cred.name, n: cred.nodes.length }))) return;
  }
  S.f.credentials = S.f.credentials.filter(c => c.id !== id);
  render();
}

function updateCred(id, field, val) {
  const cred = S.f.credentials.find(c => c.id === id);
  if (cred) cred[field] = val;
}

function togglePass(id) {
  S.showPass[id] = !S.showPass[id];
  render();
}

function openNodeModal(credId) {
  S.nodeModal = { show: true, credId, selectedNodeIds: [], search: '' };
  render();
}

function closeNodeModal() {
  S.nodeModal.show = false;
  render();
}

function setNodeSearch(val) {
  S.nodeModal.search = val;
  S.nodeModal.selectedNodeIds = [];
  render();
}

function toggleNodeSelection(nodeId, checked) {
  if (checked) {
    if (!S.nodeModal.selectedNodeIds.includes(nodeId)) S.nodeModal.selectedNodeIds.push(nodeId);
  } else {
    S.nodeModal.selectedNodeIds = S.nodeModal.selectedNodeIds.filter(id => id !== nodeId);
  }
  const footer = document.querySelector('.modal-box .border-t');
  if (footer) {
    const n = S.nodeModal.selectedNodeIds.length;
    const countEl = footer.querySelector('span');
    if (countEl) countEl.innerHTML = n > 0 ? t('nodeModal.selected_count', { n: `<strong class="text-primary">${n}</strong>` }) : t('nodeModal.none_selected');
    const addBtn = footer.querySelector('.primary-btn');
    if (addBtn) {
      addBtn.disabled = n === 0;
      addBtn.innerHTML = n > 0
        ? `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> ${t('nodeModal.add_btn', { n })}`
        : `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg> ${t('nodeModal.add_btn_empty')}`;
    }
  }
}

function toggleAllNodeSelection() {
  const cred = S.f.credentials.find(c => c.id === S.nodeModal.credId);
  const addedIds = new Set(cred ? cred.nodes.map(n => n.id) : []);
  const search = S.nodeModal.search.toLowerCase();
  const available = NODES.filter(n =>
    !addedIds.has(n.id) &&
    (search === '' || n.name.toLowerCase().includes(search) || n.code.toLowerCase().includes(search))
  );
  if (S.nodeModal.selectedNodeIds.length === available.length) {
    S.nodeModal.selectedNodeIds = [];
  } else {
    S.nodeModal.selectedNodeIds = available.map(n => n.id);
  }
  render();
}

function addSelectedNodes(credId) {
  const cred = S.f.credentials.find(c => c.id === credId);
  if (!cred) return;
  const addedIds = new Set(cred.nodes.map(n => n.id));
  const toAdd = NODES.filter(n => S.nodeModal.selectedNodeIds.includes(n.id) && !addedIds.has(n.id));
  if (!toAdd.length) {
    toast(t('toast.node_selection_required'), 'warning');
    return;
  }
  cred.nodes.push(...toAdd.map(n => ({ ...n })));
  S.nodeModal.selectedNodeIds = [];
  toast(t('toast.nodes_added', { n: toAdd.length }), 'success');
  render();
}

function deleteNode(credId, nodeId) {
  const cred = S.f.credentials.find(c => c.id === credId);
  if (!cred) return;
  cred.nodes = cred.nodes.filter(n => n.id !== nodeId);
  render();
}

// =========================================================
// SAVE / API VALIDATION
// =========================================================
function saveContract() {
  S.validating = true;
  S.validationResults = {};
  render();

  const creds = S.f.credentials;
  if (creds.length === 0) {
    finalizeSave(true);
    return;
  }

  let done = 0;
  let allOk = true;

  creds.forEach(cred => {
    const delay = 800 + Math.random() * 1000;
    const ok = Math.random() > 0.15;
    setTimeout(() => {
      S.validationResults[cred.id] = ok ? 'ok' : 'error';
      if (!ok) allOk = false;
      done++;
      if (done === creds.length) {
        S.validating = false;
        render();
        if (allOk) {
          finalizeSave(true);
        } else {
          toast(t('toast.credential_api_error'), 'error');
        }
      } else {
        render();
      }
    }, delay);
  });
}

function finalizeSave(success) {
  if (!success) return;
  const f = S.f;
  if (S.editingId !== null) {
    const idx = contracts.findIndex(c => c.id === S.editingId);
    contracts[idx] = {
      ...contracts[idx],
      companyId: +f.companyId,
      orderShipping: f.orderShipping, returnShipping: f.returnShipping,
      minDesi: +f.minDesi, maxDesi: +f.maxDesi,
      minOrderAmount: f.minOrderAmount !== '' ? +f.minOrderAmount : '',
      maxOrderAmount: f.maxOrderAmount !== '' ? +f.maxOrderAmount : '',
      coveredRegions: f.coveredRegions,
      credentials: f.credentials,
    };
    toast(t('toast.contract_updated', { name: f.name }), 'success');
  } else {
    const _co = getCompany(+f.companyId);
    const _sameCount = contracts.filter(c => c.companyId === +f.companyId).length;
    const _autoName = _co ? (_sameCount > 0 ? `${_co.name} #${_sameCount + 1}` : _co.name) : t('contracts.title_singular');
    contracts.push({
      id: newContractId(),
      companyId: +f.companyId, name: _autoName,
      status: 'active',
      createdAt: new Date().toISOString().split('T')[0],
      orderShipping: f.orderShipping, returnShipping: f.returnShipping,
      minDesi: +f.minDesi, maxDesi: +f.maxDesi,
      minOrderAmount: f.minOrderAmount !== '' ? +f.minOrderAmount : '',
      maxOrderAmount: f.maxOrderAmount !== '' ? +f.maxOrderAmount : '',
      coveredRegions: f.coveredRegions,
      credentials: f.credentials,
    });
    toast(t('toast.contract_created', { name: f.name }), 'success');
  }
  S.view = 'list';
  render();
}

// =========================================================
// TOAST
// =========================================================
function toast(msg, type = 'info') {
  const container = document.getElementById('toasts');
  if (!container) return;

  const colors = {
    success: { bg: '#e3f7ec', border: '#84ebb4', text: '#0b4627', icon: '#1fc16b' },
    error:   { bg: '#ffebec', border: '#ffc0c5', text: '#681219', icon: '#fb3748' },
    warning: { bg: '#fff3eb', border: '#ffd9c0', text: '#71330a', icon: '#fa7319' },
    info:    { bg: '#ebf1ff', border: '#c0d5ff', text: '#182f8b', icon: '#335cff' },
  };
  const c = colors[type] || colors.info;

  const icons = {
    success: 'M5 13l4 4L19 7',
    error:   'M6 18L18 6M6 6l12 12',
    warning: 'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z',
    info:    'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z',
  };

  const el = document.createElement('div');
  el.className = 'toast';
  el.style.cssText = `background:${c.bg};border:1.5px solid ${c.border};color:${c.text};border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;font-size:13px;box-shadow:0 16px 32px -12px #0e121b1a`;
  el.innerHTML = `
    <svg style="width:16px;height:16px;color:${c.icon};flex-shrink:0;margin-top:1px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="${icons[type]}"/>
    </svg>
    <span>${msg}</span>
  `;
  container.appendChild(el);
  setTimeout(() => { el.classList.add('exit'); setTimeout(() => el.remove(), 300); }, 3500);
}

// =========================================================
// BIND EVENTS
// =========================================================
function bindEvents() {
  // All events are inline onclick
}

// =========================================================
// BOOT
// =========================================================
render();
</script>
